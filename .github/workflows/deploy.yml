name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - gh-pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy files to docs
        run: |
          mkdir -p docs
          cp bkfl-manage.html docs/index.html
          cp bk_logo.png docs/
          cp dashboard.html docs/
          cp app.jsx docs/ 2>/dev/null || true

      - name: Commit and push docs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/
          git diff --staged --quiet || (git commit -m "Auto-update docs for GitHub Pages" && git push)
