/* Build an empty customFields object from dynamic field definitions */
function buildEmptyCF(scope,bkType,overrides){
  const defs=(()=>{try{const s=localStorage.getItem("bkfl_custom_fields");if(s)return JSON.parse(s);}catch(e){}return DEFAULT_CUSTOM_FIELDS;})();
  const obj={};
  defs.filter(f=>(f.scope===scope||f.scope==="both")&&(!f.bkType||f.bkType===bkType)).forEach(f=>{obj[f.key]="";});
  return {...obj,...(overrides||{})};
}

/* ── Confirm Modal ── */
function ConfirmModal({open,title,message,confirmLabel,onConfirm,onCancel}){
  if(!open)return null;
  return(
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}} onClick={onCancel}>
      <div style={{background:"#fff",borderRadius:12,padding:"28px 32px",width:420,maxWidth:"90vw",boxShadow:"0 12px 40px rgba(0,0,0,0.25)"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <div style={{width:40,height:40,borderRadius:10,background:"#fde8e8",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 9v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="#dc3545" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
          <h3 style={{fontSize:17,fontWeight:700,color:"#434343",margin:0}}>{title||"Confirm Delete"}</h3>
        </div>
        <p style={{fontSize:14,color:"#555",lineHeight:1.6,margin:"0 0 24px 0"}}>{message||"Are you sure? This action cannot be undone."}</p>
        <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
          <button onClick={onCancel} style={{padding:"9px 22px",fontSize:13,fontWeight:600,border:"1px solid #d0d0d0",borderRadius:8,background:"#fff",color:"#434343",cursor:"pointer"}}>Cancel</button>
          <button onClick={onConfirm} style={{padding:"9px 22px",fontSize:13,fontWeight:600,border:"none",borderRadius:8,background:"#dc3545",color:"#fff",cursor:"pointer"}}>{confirmLabel||"Delete"}</button>
        </div>
      </div>
    </div>
  );
}
function useConfirm(){
  const [state,setState]=React.useState({open:false,title:"",message:"",confirmLabel:"",resolve:null});
  const confirm=React.useCallback((opts)=>{
    return new Promise((resolve)=>{setState({open:true,title:opts.title||"Confirm Delete",message:opts.message||"Are you sure? This action cannot be undone.",confirmLabel:opts.confirmLabel||"Delete",resolve});});
  },[]);
  const handleConfirm=React.useCallback(()=>{if(state.resolve)state.resolve(true);setState(s=>({...s,open:false}));},[state.resolve]);
  const handleCancel=React.useCallback(()=>{if(state.resolve)state.resolve(false);setState(s=>({...s,open:false}));},[state.resolve]);
  const modal=React.createElement(ConfirmModal,{open:state.open,title:state.title,message:state.message,confirmLabel:state.confirmLabel,onConfirm:handleConfirm,onCancel:handleCancel});
  return [confirm,modal];
}

/* ─── TOP BAR ─── */
function TopBar({leads,setLeads,matters,setMatters,standaloneContacts,setStandaloneContacts,setPage,setSelectedMatter,setSelectedLead}){
  const dynamicLeadStages=(()=>{try{const s=localStorage.getItem("bkfl_lead_stages");if(s)return JSON.parse(s);}catch(e){}return LEAD_STAGES;})();
  const dynamicMatterStages=(()=>{try{const s=localStorage.getItem("bkfl_matter_stages");if(s)return JSON.parse(s);}catch(e){}return MATTER_STAGES;})();
  const [showCreateMenu,setShowCreateMenu]=useState(false);

            <div><label style={labelStyle}>Last Name</label><input type="text" value={contactOnlyForm.lastName} onChange={e=>setContactOnlyForm({...contactOnlyForm,lastName:e.target.value})} style={inputStyle} placeholder="Last name"/></div>

            <div><label style={labelStyle}>Email</label><input type="email" value={contactOnlyForm.email} onChange={e=>setContactOnlyForm({...contactOnlyForm,email:e.target.value})} style={inputStyle} placeholder="email@example.com"/></div>
            <div><label style={labelStyle}>Phone</label><input type="tel" value={contactOnlyForm.phone} onChange={e=>setContactOnlyForm({...contactOnlyForm,phone:e.target.value})} style={inputStyle} placeholder="(555) 555-0000"/></div>
          </div>
          <div style={{marginBottom:20}}></div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button onClick={()=>setShowContactOnly(false)} style={{padding:"10px 20px",fontSize:13,fontWeight:500,border:"1px solid #d0d0d0",borderRadius:6,background:"#fff",color:"#434343",cursor:"pointer"}}>Cancel</button>
            <button onClick={()=>{
              if(!contactOnlyForm.firstName||!contactOnlyForm.lastName)return;
              const c={id:Date.now(),name:contactOnlyForm.firstName+" "+contactOnlyForm.lastName,firstName:contactOnlyForm.firstName,middleName:contactOnlyForm.middleName||"",lastName:contactOnlyForm.lastName,email:contactOnlyForm.email||"",phone:contactOnlyForm.phone||"",role:contactOnlyForm.role,createdDate:new Date().toISOString().split("T")[0]};
              setStandaloneContacts(prev=>[c,...prev]);
              setShowContactOnly(false);
              setContactOnlyForm({firstName:"",middleName:"",lastName:"",email:"",phone:"",role:"Other"});
            }} style={{padding:"10px 20px",fontSize:13,fontWeight:500,border:"none",borderRadius:6,background:"#7a9c80",color:"#fff",cursor:"pointer"}}>Save Contact</button>
          </div>

    )}
    </React.Fragment>
  );
}

/* ─── ANALYZE DOCS WIDGET ─── */
function AnalyzeDocsWidget({item,isLead}){
  const [dragOver,setDragOver]=useState(false);
  const [selectedDocs,setSelectedDocs]=useState([]);
  const [selectedTemplate,setSelectedTemplate]=useState("");
  const [customPrompt,setCustomPrompt]=useState("");
  const [analyzing,setAnalyzing]=useState(false);
  const [result,setResult]=useState("");
  const [draggedDoc,setDraggedDoc]=useState(null);

  const templates=[
    {id:"means_test",label:"Means Test Analysis",prompt:"Analyze the uploaded documents to determine Chapter 7 eligibility. Extract monthly income from pay stubs, calculate Current Monthly Income (CMI), compare against median thresholds, and identify allowable deductions."},
    {id:"preference",label:"Preference Payment Review",prompt:"Review bank statements for potential preference payments made to creditors within 90 days before filing (1 year for insiders). Flag any payments over $600 to a single creditor."},
    {id:"fraudulent_transfer",label:"Fraudulent Transfer Analysis",prompt:"Analyze bank statements and asset records for potential fraudulent transfers within 2 years of filing. Look for property transfers, gifts, below-market sales, and unusual withdrawals."},
    {id:"income_analysis",label:"Income & Expense Analysis",prompt:"Extract and summarize all income sources and recurring expenses from pay stubs, bank statements, and bills. Calculate net monthly disposable income and identify any unreported income."},
    {id:"asset_exemption",label:"Asset & Exemption Review",prompt:"Review documents for all disclosed assets. Compare against applicable state exemption limits. Identify any non-exempt assets at risk of liquidation by the trustee."},
    {id:"credit_report",label:"Credit Report Discrepancy Check",prompt:"Cross-reference the credit report against the petition schedules. Identify any undisclosed debts, incorrect balances, or creditors not listed in the filing."},
    {id:"341_prep",label:"341 Meeting Preparation",prompt:"Analyze all case documents and generate likely trustee questions for the 341 Meeting of Creditors. Highlight any red flags or inconsistencies the trustee may ask about."},
    {id:"plan_feasibility",label:"Ch.13 Plan Feasibility",prompt:"Evaluate whether the proposed Chapter 13 plan is feasible based on income, expenses, and debt totals. Calculate projected plan payments and determine if the debtor can maintain payments over 3-5 years."},
  ];

  // Get documents from Intake Document Submissions folder (all subfolders)
  const allDocs=(item.documents||[]);
  const intakeDocs=allDocs.filter(d=>d.folder==="Intake Document Submissions");
  const incomeDocs=allDocs.filter(d=>d.folder==="Intake Document Submissions"&&d.subfolder==="Income Docs");
  const sourceDocs=isLead?intakeDocs:allDocs;

  const handleDocDragStart=(e,doc)=>{
    setDraggedDoc(doc);
    e.dataTransfer.setData("text/plain",doc.name);
    e.dataTransfer.effectAllowed="copy";
  };

  const handleAnalysisDrop=(e)=>{
    e.preventDefault();setDragOver(false);
    // Handle internal doc drag
    if(draggedDoc){
      if(!selectedDocs.find(d=>d.id===draggedDoc.id)){
        setSelectedDocs(prev=>[...prev,draggedDoc]);
      }
      setDraggedDoc(null);
      return;
    }
    // Handle external file drop
    const files=Array.from(e.dataTransfer.files||[]);
    if(files.length>0)setSelectedDocs(prev=>[...prev,...files.map(f=>({name:f.name,size:f.size,id:Date.now()+Math.random(),external:true}))]);
  };

  const removeDoc=(id)=>setSelectedDocs(prev=>prev.filter(d=>d.id!==id));

  const runAnalysis=()=>{
    const prompt=selectedTemplate?templates.find(t=>t.id===selectedTemplate)?.prompt:customPrompt;
    if(!prompt||selectedDocs.length===0)return;
    setAnalyzing(true);
    setTimeout(()=>{
      setResult("Analysis complete. Processed "+selectedDocs.length+" document"+(selectedDocs.length!==1?"s":"")+" using the \""+(selectedTemplate?templates.find(t=>t.id===selectedTemplate)?.label:"Custom")+"\" template. Full analysis results would appear here in a production environment with AI integration enabled.");
      setAnalyzing(false);
    },1500);
  };

  return(
    <div style={{display:"flex",gap:0,border:"1px solid #e0e0e0",borderRadius:8,overflow:"hidden",minHeight:420}}>
      {/* Left Panel — Document Source */}
      <div style={{flex:"0 0 50%",borderRight:"1px solid #e0e0e0",background:"#fafafa",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"12px 14px",borderBottom:"1px solid #e0e0e0",background:"#f5f5f5"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#434343",textTransform:"uppercase",letterSpacing:"0.5px"}}>Documents</div>
          <div style={{fontSize:11,color:"#888",marginTop:2}}>Drag files to analysis zone →</div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:10}}>
          {sourceDocs.length===0?(
            <div style={{textAlign:"center",padding:20,color:"#aaa",fontSize:12}}>No documents uploaded yet</div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {sourceDocs.map((doc,i)=>(
                <div key={doc.id||i} draggable onDragStart={(e)=>handleDocDragStart(e,doc)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:6,background:selectedDocs.find(d=>d.id===doc.id)?"#dce8de":"#fff",border:"1px solid "+(selectedDocs.find(d=>d.id===doc.id)?"#7a9c80":"#e8e8e8"),cursor:"grab",transition:"all 0.15s",userSelect:"none"}} onMouseEnter={e=>{if(!selectedDocs.find(d=>d.id===doc.id))e.currentTarget.style.borderColor="#7a9c80";}} onMouseLeave={e=>{if(!selectedDocs.find(d=>d.id===doc.id))e.currentTarget.style.borderColor="#e8e8e8";}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{flexShrink:0}}><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#c0392b" strokeWidth="1.5"/><path d="M14 2v6h6" stroke="#c0392b" strokeWidth="1.5"/></svg>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:500,color:"#434343",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{doc.name||"Unnamed"}</div>
                    {doc.subfolder&&<div style={{fontSize:10,color:"#999"}}>{doc.subfolder}</div>}
                  </div>
                  {selectedDocs.find(d=>d.id===doc.id)&&<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#3d5c43" strokeWidth="3" strokeLinecap="round"/></svg>}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Right Panel — Analysis Zone */}
      <div style={{flex:1,display:"flex",flexDirection:"column",background:"#fff"}}>
        <div style={{padding:"12px 14px",borderBottom:"1px solid #e0e0e0",background:"#f5f5f5"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#434343",textTransform:"uppercase",letterSpacing:"0.5px"}}>AI Analysis</div>
          <div style={{fontSize:11,color:"#888",marginTop:2}}>{selectedDocs.length} document{selectedDocs.length!==1?"s":""} queued</div>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:12,display:"flex",flexDirection:"column",gap:10}}>
          {/* Drop zone */}
          <div onDragOver={(e)=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onDrop={handleAnalysisDrop} style={{border:"2px dashed "+(dragOver?"#7a9c80":"#d0d0d0"),borderRadius:8,padding:selectedDocs.length>0?10:20,textAlign:"center",background:dragOver?"#f0f7f1":"#fafafa",transition:"all 0.2s",minHeight:selectedDocs.length>0?"auto":80}}>
            {selectedDocs.length===0?(
              <div>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style={{margin:"0 auto 6px"}}><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke={dragOver?"#7a9c80":"#bbb"} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                <div style={{fontSize:12,color:dragOver?"#3d5c43":"#999",fontWeight:500}}>Drop documents here</div>
              </div>
            ):(
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {selectedDocs.map(d=>(
                  <span key={d.id} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 8px",borderRadius:5,background:"#dce8de",border:"1px solid #b8d4bc",fontSize:11,color:"#3d5c43",fontWeight:500}}>
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#3d5c43" strokeWidth="2"/></svg>
                    {(d.name||"").length>18?(d.name||"").slice(0,16)+"...":d.name}
                    <button onClick={()=>removeDoc(d.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#3d5c43",fontSize:12,fontWeight:700,lineHeight:1,padding:0,marginLeft:2}}>&times;</button>
                  </span>
                ))}
              </div>
            )}
          </div>

          {/* Template selector */}
          <select value={selectedTemplate} onChange={e=>{setSelectedTemplate(e.target.value);setCustomPrompt("");}} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:12,background:"#fff",boxSizing:"border-box"}}>
            <option value="">— Select analysis template —</option>
            {templates.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
          </select>

          {/* Custom prompt */}
          {!selectedTemplate&&(
            <textarea value={customPrompt} onChange={e=>setCustomPrompt(e.target.value)} placeholder="Or type a custom analysis prompt..." rows={2} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:12,resize:"vertical",boxSizing:"border-box"}}/>
          )}

          {/* Template preview */}
          {selectedTemplate&&(
            <div style={{padding:8,background:"#f8f9fa",borderRadius:6,border:"1px solid #e8e8e8"}}>
              <div style={{fontSize:10,color:"#888",fontWeight:600,marginBottom:3}}>PROMPT</div>
              <div style={{fontSize:11,color:"#555",lineHeight:1.5}}>{templates.find(t=>t.id===selectedTemplate)?.prompt}</div>
            </div>
          )}

          {/* Run button */}
          <button onClick={runAnalysis} disabled={analyzing||selectedDocs.length===0||(!selectedTemplate&&!customPrompt)} style={{width:"100%",padding:"9px 14px",borderRadius:6,border:"none",background:(analyzing||selectedDocs.length===0||(!selectedTemplate&&!customPrompt))?"#d0d0d0":"#7a9c80",color:"#fff",fontSize:12,fontWeight:600,cursor:(analyzing||selectedDocs.length===0||(!selectedTemplate&&!customPrompt))?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            {analyzing?(<><svg width="12" height="12" viewBox="0 0 24 24" fill="none" style={{animation:"spin 1s linear infinite"}}><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg>Analyzing...</>):(<><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>Run AI Analysis</>)}
          </button>

          {/* Result */}
          {result&&(
            <div style={{padding:10,background:"#f0f7f1",borderRadius:6,border:"1px solid #dce8de"}}>
              <div style={{fontSize:11,fontWeight:600,color:"#3d5c43",marginBottom:4}}>Analysis Result</div>
              <div style={{fontSize:12,color:"#555",lineHeight:1.6}}>{result}</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ─── AI TAB ─── */
function AITab({item,isLead,update}){
  const itemName=isLead?item.firstName+" "+item.lastName:item.clientFullName||item.clientName;
  const stage=isLead?item.leadStage:item.matterStage;
  const bkType=item.bankruptcyType||"Chapter 7";

  // Means Test data from item or defaults
  const mt=item.meansTest||{};
  const cmi=mt.cmi||item.monthlyIncome||0;
  const householdSize=mt.householdSize||1;
  // Median income thresholds by household size (2025 Census / DOJ)
  const medianThresholds={1:63957,2:83476,3:97234,4:114663,5:124663,6:134663};
  const medianThreshold=mt.medianThreshold||(medianThresholds[householdSize]||medianThresholds[1]);
  const annualizedIncome=cmi*12;
  const belowMedian=annualizedIncome<=medianThreshold;
  const deductions=mt.deductions||0;
  const adjustedCAI=belowMedian?0:Math.max(0,cmi-deductions);
  const passes=belowMedian||adjustedCAI<=0;

  // Confidence Score: 20 base + up to 60 for pay stubs (10 per month) + 20 for tax doc match
  const payStubMonths=Math.min(6,parseInt(mt.payStubMonths)||0);
  const taxMatch=mt.taxMatch||false;
  const confidenceScore=Math.min(100,20+(payStubMonths*10)+(taxMatch?20:0));
  const confidenceColor=confidenceScore>=80?"#3d5c43":confidenceScore>=50?"#FF9800":"#c0392b";
  const confidenceLevel=confidenceScore>=80?"High":confidenceScore>=50?"Medium":"Low";
  const confidenceExplanation=confidenceScore>=80?"Strong documentation supports this analysis. Pay stubs and tax records are well-matched.":confidenceScore>=50?"Moderate documentation received. Additional pay stubs or tax verification would strengthen confidence.":"Limited documentation available. Analysis reliability is low until more records are provided.";

  const saveMeansTest=(field,val)=>{
    const updated={...mt,[field]:parseFloat(val)||0};
    if(update)update({meansTest:updated});
  };

  // Recommendations based on stage
  const getRecs=()=>{
    const r=[];
    if(isLead){
      if(stage==="New Lead"){r.push("Schedule initial consultation","Send intake form to client","Run preliminary means test","Verify income documents");}
      else if(stage==="Consult Scheduled"){r.push("Prepare consultation questions","Review client credit report","Estimate case complexity");}
      else if(stage==="Pending Engagement"){r.push("Send engagement letter","Collect required documents","Schedule signing appointment");}
      else{r.push("Order credit report","Send intake form","Schedule credit counseling");}
    }else{
      if(stage.includes("Pending Documents")){r.push("Send document collection list","Request missing exhibits","Schedule document review");}
      else if(stage.includes("Review")){r.push("Complete petition review","Prepare client for filing","Order credit report");}
      else if(stage.includes("341")){r.push("Review petition with client","Prepare client for trustee questions","Confirm Zoom credentials");}
      else if(stage.includes("Filed")){r.push("Monitor case docket","Prepare for 341 hearing","Send document request to client");}
      else if(stage.includes("Discharge")){r.push("Confirm discharge entered","Send discharge letter to client","Close matter");}
      else{r.push("Review case status","Check for outstanding tasks","Follow up with client");}
    }
    return r;
  };

  // Document checklist
  const getDocChecklist=()=>{
    const docs=item.documents||[];
    const docNames=docs.map(d=>(d.name||"").toLowerCase());
    const required=[
      {name:"Pay Stubs (6 months)",key:"pay stub"},
      {name:"Bank Statements (6 months)",key:"bank statement"},
      {name:"Tax Returns (2 years)",key:"tax return"},
      {name:"Credit Report",key:"credit report"},
      {name:"Driver's License / ID",key:"license"},
      {name:"Social Security Card",key:"social security"},
      {name:"Vehicle Registration",key:"vehicle"},
      {name:"Mortgage Statement",key:"mortgage"},
      {name:"Credit Counseling Certificate",key:"credit counseling"},
    ];
    return required.map(r=>({...r,received:docNames.some(d=>d.includes(r.key))}));
  };

  // Risk flags
  const getFlags=()=>{
    const f=[];
    if(item.documents&&item.documents.length===0)f.push({text:"No documents uploaded yet",level:"warning"});
    if(!isLead&&!item.customFields?.caseNumber)f.push({text:"Case number not assigned",level:"warning"});
    if(isLead&&!item.leadNotes)f.push({text:"Lead notes not documented",level:"info"});
    if(cmi>0&&!belowMedian&&bkType==="Chapter 7")f.push({text:"Income above median — Chapter 7 eligibility at risk",level:"critical"});
    if(!isLead&&item.outstandingBalance>0)f.push({text:"Outstanding balance of "+fmtDec(item.outstandingBalance),level:"warning"});
    return f;
  };

  const recs=getRecs();
  const docChecklist=getDocChecklist();
  const flags=getFlags();
  const receivedCount=docChecklist.filter(d=>d.received).length;

  // Complexity Score Calculation
  const getComplexityScore=()=>{
    let score=0;
    let factors=[];
    // Debt level
    const debt=item.totalDebt||0;
    if(debt>100000){score+=25;factors.push({label:"High Debt (>$100k)",points:25});}
    else if(debt>50000){score+=15;factors.push({label:"Moderate Debt ($50k-$100k)",points:15});}
    else if(debt>20000){score+=8;factors.push({label:"Standard Debt ($20k-$50k)",points:8});}
    else if(debt>0){score+=3;factors.push({label:"Low Debt (<$20k)",points:3});}
    // Income above median
    if(!belowMedian&&cmi>0){score+=20;factors.push({label:"Income Above Median",points:20});}
    // Asset complexity
    const assets=item.totalAssets||0;
    if(assets>50000){score+=15;factors.push({label:"Significant Assets (>$50k)",points:15});}
    else if(assets>20000){score+=8;factors.push({label:"Moderate Assets ($20k-$50k)",points:8});}
    // Joint case
    const contacts=item.contacts||[];
    if(contacts.length>1){score+=10;factors.push({label:"Joint Filing",points:10});}
    // Missing documents
    const missingDocs=docChecklist.filter(d=>!d.received).length;
    if(missingDocs>=6){score+=15;factors.push({label:"Many Documents Missing ("+missingDocs+")",points:15});}
    else if(missingDocs>=3){score+=8;factors.push({label:"Some Documents Missing ("+missingDocs+")",points:8});}
    // Chapter 13 adds complexity
    if(bkType==="Chapter 13"){score+=15;factors.push({label:"Chapter 13 (Plan Required)",points:15});}
    // Risk flags
    if(flags.filter(f=>f.level==="critical").length>0){score+=10;factors.push({label:"Critical Risk Flags",points:10});}
    return{score:Math.min(score,100),factors};
  };
  const complexity=getComplexityScore();
  const complexityLevel=complexity.score>=70?"High":complexity.score>=40?"Medium":"Low";
  const complexityColor=complexity.score>=70?"#c0392b":complexity.score>=40?"#FF9800":"#3d5c43";

  // AI Attorney Summary
  const getAttorneySummary=()=>{
    const parts=[];
    parts.push(itemName+" — "+bkType+" "+(isLead?"lead":"matter")+", currently at \""+stage+"\" stage.");
    if(cmi>0){
      parts.push("CMI: "+fmtDec(cmi)+"/mo"+(belowMedian?" (below median, HH size "+householdSize+").":" (ABOVE median, HH size "+householdSize+" — Ch. 7 eligibility concern)."));
    }
    if(!isLead&&item.totalDebt>0){
      parts.push("Scheduled debt: "+fmtDec(item.totalDebt)+". Assets: "+fmtDec(item.totalAssets||0)+". Exemptions: "+fmtDec(item.exemptions||0)+".");
    }
    if(!belowMedian&&bkType==="Chapter 7")parts.push("ALERT: Means test may not pass — consider Chapter 13 conversion or further deduction analysis.");
    if(receivedCount<docChecklist.length){
      parts.push("Document status: "+receivedCount+"/"+docChecklist.length+" received ("+Math.round((receivedCount/docChecklist.length)*100)+"% complete). Missing items may delay filing.");
    }else{
      parts.push("All required documents received — ready for petition preparation.");
    }
    if(flags.filter(f=>f.level==="critical").length>0)parts.push("CRITICAL FLAGS present — review before proceeding.");
    parts.push("Complexity: "+complexityLevel+" ("+complexity.score+"/100).");
    if(!isLead&&item.customFields?.dateTime341)parts.push("341 Meeting: "+item.customFields.dateTime341+".");
    return parts.join(" ");
  };

  // AI Debtor Summary
  const getDebtorSummary=()=>{
    const parts=[];
    parts.push("Dear "+itemName.split(" ")[0]+", here is a summary of your "+bkType+" bankruptcy case.");
    parts.push("Your case is currently in the \""+stage+"\" phase.");
    if(cmi>0){
      if(belowMedian)parts.push("Based on your household income of "+fmtDec(cmi)+" per month, you qualify under the income limits for your household size.");
      else parts.push("Your household income of "+fmtDec(cmi)+" per month is above the threshold for your household size. Your attorney will work with you on next steps.");
    }
    if(!isLead&&item.totalDebt>0){
      parts.push("Your total reported debts are "+fmtDec(item.totalDebt)+".");
    }
    if(receivedCount<docChecklist.length){
      const missing=docChecklist.filter(d=>!d.received).map(d=>d.name);
      parts.push("We still need the following documents from you: "+missing.join(", ")+".");
    }else{
      parts.push("We have received all the documents we need from you. Thank you!");
    }
    if(!isLead&&item.customFields?.dateTime341)parts.push("Your 341 Meeting of Creditors is scheduled for "+item.customFields.dateTime341+". Your attorney will prepare you beforehand.");
    parts.push("If you have any questions, please don't hesitate to contact our office.");
    return parts.join(" ");
  };

  // PDF download handler
  const downloadSummaryPDF=(title,content)=>{
    const printWin=window.open("","_blank","width=800,height=600");
    printWin.document.write("<html><head><title>"+title+"</title><style>body{font-family:'Inter',sans-serif;padding:40px;line-height:1.8;color:#333;max-width:700px;margin:0 auto;}h1{font-size:18px;color:#3d5c43;border-bottom:2px solid #7a9c80;padding-bottom:10px;margin-bottom:20px;}.meta{font-size:12px;color:#888;margin-bottom:20px;}.content{font-size:14px;}</style></head><body>");
    printWin.document.write("<h1>"+title+"</h1>");
    printWin.document.write("<div class='meta'>Generated: "+new Date().toLocaleDateString()+" | Client: "+itemName+" | "+bkType+"</div>");
    printWin.document.write("<div class='content'>"+content+"</div>");
    printWin.document.write("<div style='margin-top:30px;padding:12px 16px;background:#f8f9fa;border-left:3px solid #d0d0d0;border-radius:4px;'><p style='font-size:11px;line-height:1.6;color:#888;margin:0;font-style:italic;'>This summary was generated by AI and is based solely on the information submitted through your intake worksheet and uploaded documents. It does not constitute legal advice. The information has not been independently verified and may contain errors or omissions. Please review all details with your attorney before relying on this summary or taking any action.</p></div>");
    printWin.document.write("</body></html>");
    printWin.document.close();
    setTimeout(()=>{printWin.print();},300);
  };

  return(
    <div>
      <div style={{fontSize:12,color:"#999",fontStyle:"italic",marginBottom:14,textAlign:"center"}}>*AI makes mistakes! A human should always confirm information</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:20}}>

        {/* AI Means Test Analysis */}
        <Widget title="AI Means Test Analysis" collapsible={false}>
          {/* Result indicator */}
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderRadius:10,background:belowMedian?"#f0f7f1":"#fef2f2",marginBottom:16}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              {belowMedian?<><path d="M22 11.08V12a10 10 0 11-5.93-9.14" stroke="#3d5c43" strokeWidth="2" strokeLinecap="round"/><path d="M22 4L12 14.01l-3-3" stroke="#3d5c43" strokeWidth="2" strokeLinecap="round"/></>:<><circle cx="12" cy="12" r="10" stroke="#c0392b" strokeWidth="2"/><path d="M15 9l-6 6M9 9l6 6" stroke="#c0392b" strokeWidth="2" strokeLinecap="round"/></>}
            </svg>
            <span style={{fontSize:14,fontWeight:600,color:belowMedian?"#3d5c43":"#c0392b"}}>{belowMedian?"Income is below the median":"Income is above the median"}</span>
          </div>

          {/* Median Family Income */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 0",borderBottom:"1px solid #f0f0f0"}}>
            <div>
              <div style={{fontSize:14,fontWeight:500,color:"#434343"}}>Median Family Income</div>
              <div style={{fontSize:11,color:"#999",marginTop:2}}>{mt.state||"California"} • Household of {householdSize} (UST)</div>
            </div>
            <div style={{fontSize:16,fontWeight:700,color:"#1a73e8"}}>{fmtDec(medianThreshold)}</div>
          </div>

          {/* Annualized CMI */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 0",borderBottom:"1px solid #f0f0f0"}}>
            <div style={{fontSize:14,fontWeight:500,color:"#434343"}}>Current Monthly Income (CMI)</div>
            <div style={{fontSize:16,fontWeight:700,color:belowMedian?"#3d5c43":"#c0392b"}}>{fmtDec(cmi)}</div>
          </div>
          {/* Confidence Score */}
          <div style={{padding:"14px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontSize:14,fontWeight:500,color:"#434343"}}>Confidence Score</div>
              <span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:confidenceScore>=80?"#dce8de":confidenceScore>=50?"#FFF3E0":"#fde8e8",color:confidenceColor}}>{confidenceLevel}</span>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:28,fontWeight:700,color:confidenceColor}}>{confidenceScore}</span>
                <span style={{fontSize:12,color:"#888"}}>/100</span>
              </div>
              <div style={{width:"100%",height:8,background:"#f0f0f0",borderRadius:4,overflow:"hidden"}}>
                <div style={{width:confidenceScore+"%",height:"100%",background:confidenceColor,borderRadius:4,transition:"width 0.3s ease"}}/>
              </div>
            </div>
            <div style={{fontSize:12,color:"#777",lineHeight:"1.5"}}>{confidenceExplanation}</div>
          </div>
          <div style={{marginTop:8,padding:"10px 14px",background:"#f8f9fa",borderRadius:6,borderLeft:"3px solid #d0d0d0"}}>
            <p style={{fontSize:11,lineHeight:1.5,color:"#888",margin:0,fontStyle:"italic"}}>Confidence is based on documentation completeness: 20-point base, up to 60 points for pay stubs received (10 per month of the 6-month lookback), and 20 points if reported income is verified against tax documents within a 90% match.</p>
          </div>
        </Widget>

        {/* Complexity Score & Risk Flags */}
        <Widget title="Complexity Score" collapsible={false} actions={<span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:complexity.score>=70?"#fde8e8":complexity.score>=40?"#FFF3E0":"#dce8de",color:complexityColor}}>{complexityLevel}</span>}>
          <div style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:28,fontWeight:700,color:complexityColor}}>{complexity.score}</span>
              <span style={{fontSize:12,color:"#888"}}>/100</span>
            </div>
            <div style={{width:"100%",height:8,background:"#f0f0f0",borderRadius:4,overflow:"hidden"}}>
              <div style={{width:complexity.score+"%",height:"100%",background:complexityColor,borderRadius:4,transition:"width 0.3s ease"}}/>
            </div>
          </div>
          {complexity.factors.length>0&&(
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:flags.length>0?16:0}}>
              <div style={{fontSize:12,fontWeight:600,color:"#888",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:2}}>Contributing Factors</div>
              {complexity.factors.map((f,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:i<complexity.factors.length-1?"1px solid #f5f5f5":"none"}}>
                  <span style={{fontSize:13,color:"#555"}}>{f.label}</span>
                  <span style={{fontSize:12,fontWeight:600,color:complexityColor}}>+{f.points}</span>
                </div>
              ))}
            </div>
          )}
          {flags.length>0&&(
            <div>
              <div style={{fontSize:12,fontWeight:600,color:"#888",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8,paddingTop:flags.length>0&&complexity.factors.length>0?12:0,borderTop:complexity.factors.length>0?"1px solid #e0e0e0":"none"}}>Risk Flags ({flags.length})</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {flags.map((f,i)=>{
                  const colors={critical:{bg:"#fde8e8",border:"#f5c6c6",icon:"#c0392b",text:"#c0392b"},warning:{bg:"#FFF3E0",border:"#FFE0B2",icon:"#FF9800",text:"#E65100"},info:{bg:"#e8f4fd",border:"#bbdefb",icon:"#1a73e8",text:"#1565c0"}};
                  const c=colors[f.level]||colors.info;
                  return(
                    <div key={i} style={{display:"flex",gap:10,padding:8,background:c.bg,borderRadius:6,border:"1px solid "+c.border,alignItems:"center"}}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{flexShrink:0}}><path d="M12 9v4M12 17h.01" stroke={c.icon} strokeWidth="2.5" strokeLinecap="round"/><circle cx="12" cy="12" r="10" stroke={c.icon} strokeWidth="1.5" fill="none"/></svg>
                      <div style={{fontSize:12,color:c.text,fontWeight:500}}>{f.text}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          <div style={{marginTop:16,padding:"10px 14px",background:"#f8f9fa",borderRadius:6,borderLeft:"3px solid #d0d0d0"}}>
            <p style={{fontSize:11,lineHeight:1.5,color:"#888",margin:0,fontStyle:"italic"}}>Score is calculated from intake data: total debt level, income relative to the state median, total assets, joint filing status, missing documents, case chapter, and critical risk flags. Each factor adds weighted points up to a maximum of 100.</p>
          </div>
        </Widget>

        {/* AI Intake Summary */}
        <Widget title="AI Intake Summary" collapsible={false} actions={<div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:"#e8f4fd",color:"#1a73e8",display:"flex",alignItems:"center",gap:4}}><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#1a73e8" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>AI</span><button onClick={()=>downloadSummaryPDF("AI Intake Summary — "+itemName,getAttorneySummary())} style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:"#f0f0f0",color:"#555",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:4}} title="Download as PDF"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#555" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><path d="M14 2v6h6M12 18v-6M9 15l3 3 3-3" stroke="#555" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>PDF</button></div>}>
          <div style={{fontSize:13,lineHeight:1.8,color:"#555"}}>{getAttorneySummary()}</div>
          <div style={{marginTop:16,padding:"12px 16px",background:"#f8f9fa",borderRadius:8,borderLeft:"3px solid #d0d0d0"}}>
            <p style={{fontSize:11,lineHeight:1.6,color:"#888",margin:0,fontStyle:"italic"}}>This summary was generated by AI and is based solely on the information submitted through your intake worksheet and uploaded documents. It does not constitute legal advice. The information has not been independently verified and may contain errors or omissions. Please review all details with your attorney before relying on this summary or taking any action.</p>
          </div>
        </Widget>

    </div>
    </div>
  );
}

  if(!matter) return <div style={{padding:40,textAlign:"center",color:"#999"}}>Matter not found.</div>;

  const update=(u)=>setMatters(prev=>prev.map(m=>m.id===matter.id?{...m,...u}:m));
  const updateCF=(k,v)=>update({customFields:{...matter.customFields,[k]:v}});
  const startEdit=(f,v)=>{setEditField(f);setEditVal(v||"");};
  const saveEdit=(f,isCF)=>{if(isCF)updateCF(f,editVal);else update({[f]:editVal});setEditField(null);};
  const openEditMatter=()=>{
    const primaryContact=(matter.contacts||[]).find(c=>c.role==="Client")||{};
    const secondContact=(matter.contacts||[]).find(c=>c.role==="Client (Spouse)");
    const isJoint=!!secondContact;
    const joint=secondContact?{firstName:secondContact.name.split(" ")[0],lastName:secondContact.name.split(" ").slice(1).join(" "),email:secondContact.email||"",phone:secondContact.phone||""}:{firstName:"",lastName:"",email:"",phone:""};
    setMatterEditForm({
      clientName:matter.clientName||"",
      firstName:primaryContact.name?primaryContact.name.split(" ")[0]:"",
      lastName:primaryContact.name?primaryContact.name.split(" ").slice(1).join(" "):"",
      email:primaryContact.email||"",
      phone:primaryContact.phone||"",
      description:matter.description||"",
      bankruptcyType:matter.bankruptcyType||"",
      responsibleAttorney:matter.responsibleAttorney||"",
      responsibleStaff:matter.responsibleStaff||"",
      matterStage:matter.matterStage||"",
      isJoint,joint
    });
    setEditingMatter(true);
  };
  const saveEditMatter=()=>{
    const f=matterEditForm;
    const contacts=[{id:1,name:(f.firstName+" "+f.lastName).trim(),role:"Client",email:f.email||"",phone:f.phone||""}];
    if(f.isJoint&&f.joint&&f.joint.firstName&&f.joint.lastName){
      contacts.push({id:2,name:f.joint.firstName+" "+f.joint.lastName,role:"Client (Spouse)",email:f.joint.email||"",phone:f.joint.phone||""});
    }
    const clientName=f.isJoint&&f.joint&&f.joint.firstName?f.firstName+" "+f.lastName+" & "+f.joint.firstName+" "+f.joint.lastName:(f.firstName+" "+f.lastName).trim();
    update({clientName,contacts,description:f.description,bankruptcyType:f.bankruptcyType,responsibleAttorney:f.responsibleAttorney,responsibleStaff:f.responsibleStaff,matterStage:f.matterStage});
    setEditingMatter(false);
  };
  const addNote=()=>{if(!newNote.trim())return;update({notes:[{id:Date.now(),date:new Date().toISOString().split("T")[0],author:"Matt McCune",text:newNote},...matter.notes]});setNewNote("");};
  const sendMessage=()=>{

                    <span style={{fontSize:13,color:"#888"}}>{filesInView.length} file{filesInView.length!==1?"s":""}</span>
                    <div style={{display:"flex",gap:4}}>
                      <button onClick={()=>setDocSort("recent")} style={{padding:"4px 10px",fontSize:11,fontWeight:docSort==="recent"?600:400,border:docSort==="recent"?"1.5px solid #7A9C80":"1px solid #d0d0d0",borderRadius:4,background:docSort==="recent"?"#E7EAE5":"#fff",color:docSort==="recent"?"#3d5c43":"#888",cursor:"pointer"}}>Most Recent</button>
                      <button onClick={()=>setDocSort("name")} style={{padding:"4px 10px",fontSize:11,fontWeight:docSort==="name"?600:400,border:docSort==="name"?"1.5px solid #7A9C80":"1px solid #d0d0d0",borderRadius:4,background:docSort==="name"?"#E7EAE5":"#fff",color:docSort==="name"?"#3d5c43":"#888",cursor:"pointer"}}>Name</button>
                    </div>
                  </div>
                  <button style={{background:"#7A9C80",color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>+ Upload</button>
                </div>
                {filesInView.length===0?<div style={{padding:40,textAlign:"center",color:"#999"}}>No files in this folder yet.</div>:
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr style={{background:"#FBFAF7",borderBottom:"1px solid #e0e0e0"}}>{["Name","Type","Date","Size"].map(h=><th key={h} style={{textAlign:"left",padding:"10px 14px",color:"#666",fontWeight:600,fontSize:12,textTransform:"uppercase",letterSpacing:0.5}}>{h}</th>)}</tr></thead>
                  <tbody>{filesInView.map(d=>(<tr key={d.id} style={{borderBottom:"1px solid #f5f5f5"}} onMouseEnter={e=>e.currentTarget.style.background="#f2f3ef"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <td style={{padding:"10px 14px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#7A9C80" strokeWidth="1.5" fill="none"/><path d="M14 2v6h6" stroke="#7A9C80" strokeWidth="1.5"/></svg><span style={{fontWeight:500,color:"#7A9C80"}}>{d.name}</span></div></td>
                    <td style={{padding:"10px 14px",color:"#888"}}>{d.type}</td>
                    <td style={{padding:"10px 14px",color:"#888"}}>{d.date?new Date(d.date+"T12:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}):""}</td>
                    <td style={{padding:"10px 14px",color:"#888"}}>{d.size}</td>
                  </tr>))}</tbody>
                </table>}
              </div>
            )}
          </div>);
        })()}

        {tab==="tasks"&&(()=>{
          const allTasks=matter.tasks||[];
          const outstanding=allTasks.filter(t=>t.status!=="Completed");
          const completed=allTasks.filter(t=>t.status==="Completed");
          const filtered=taskFilter==="outstanding"?outstanding:completed;
          const assigneeOptions=[...ATTORNEYS,...STAFF,...(matter.contacts||[]).map(c=>c.name)].filter((v,i,a)=>a.indexOf(v)===i);
          return(<div>
            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{fontSize:16,fontWeight:600,color:"#434343",margin:0}}>Tasks</h3>
              <button onClick={()=>setShowNewTask(!showNewTask)} style={{padding:"8px 20px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:showNewTask?"#f0f0f0":"#7A9C80",color:showNewTask?"#666":"#fff",cursor:"pointer"}}>{showNewTask?"Cancel":"New Task"}</button>
            </div>

            {/* New Task Form */}
            {showNewTask&&(
              <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,marginBottom:16}}>
                {/* Task Mode Toggle */}
                <div style={{display:"flex",gap:0,marginBottom:16}}>
                  <button onClick={()=>setTaskMode("custom")} style={{flex:1,padding:"10px 16px",fontSize:13,fontWeight:600,border:"1px solid #d0d0d0",borderRadius:"6px 0 0 6px",background:taskMode==="custom"?"#7A9C80":"#fff",color:taskMode==="custom"?"#fff":"#555",cursor:"pointer",transition:"all 0.15s"}}>Assign Custom Task</button>
                  <button onClick={()=>setTaskMode("built")} style={{flex:1,padding:"10px 16px",fontSize:13,fontWeight:600,border:"1px solid #d0d0d0",borderLeft:"none",borderRadius:"0 6px 6px 0",background:taskMode==="built"?"#7A9C80":"#fff",color:taskMode==="built"?"#fff":"#555",cursor:"pointer",transition:"all 0.15s"}}>Assign Built Task</button>
                </div>

                {/* Custom Task Form */}
                {taskMode==="custom"&&(
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div>
                    <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Task Name</label>
                    <input value={newTaskTitle} onChange={e=>setNewTaskTitle(e.target.value)} placeholder="Task name..." style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <div>
                    <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Description</label>
                    <textarea value={newTaskDesc} onChange={e=>setNewTaskDesc(e.target.value)} placeholder="Task description (optional)..." rows={2} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Due Date</label>
                      <input type="date" value={newTaskDue} onChange={e=>setNewTaskDue(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Assign To</label>
                      <select value={newTaskAssignee} onChange={e=>setNewTaskAssignee(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,background:"#fff"}}>
                        {assigneeOptions.map(a=><option key={a} value={a}>{a}</option>)}
                      </select>
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}>
                    <button onClick={addTask} disabled={!newTaskTitle.trim()} style={{padding:"8px 24px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:newTaskTitle.trim()?"#7A9C80":"#ccc",color:"#fff",cursor:newTaskTitle.trim()?"pointer":"default"}}>Save Task</button>
                  </div>
                </div>
                )}

                {/* Built Task Form */}
                {taskMode==="built"&&(
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div>
                    <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Select Task</label>
                    <select value={selectedBuiltTask} onChange={e=>setSelectedBuiltTask(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,background:"#fff"}}>
                      <option value="">Choose a task...</option>
                      {BUILT_TASK_CATEGORIES.map(cat=>(
                        <optgroup key={cat} label={cat}>{BUILT_TASKS.filter(t=>t.category===cat).map(t=><option key={t.title} value={t.title}>{t.title}</option>)}</optgroup>
                      ))}
                    </select>
                  </div>
                  {selectedBuiltTask&&(
                    <div style={{fontSize:12,color:"#666",background:"#f8f9f6",padding:"8px 12px",borderRadius:6,border:"1px solid #e7eae5"}}>
                      Priority: <strong style={{color:"#3d5c43"}}>{BUILT_TASKS.find(t=>t.title===selectedBuiltTask)?.priority}</strong> &middot; Category: <strong style={{color:"#3d5c43"}}>{BUILT_TASKS.find(t=>t.title===selectedBuiltTask)?.category}</strong>
                    </div>
                  )}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Due Date</label>
                      <input type="date" value={builtTaskDue} onChange={e=>setBuiltTaskDue(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Assign To</label>
                      <select value={builtTaskAssignee} onChange={e=>setBuiltTaskAssignee(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,background:"#fff"}}>
                        {assigneeOptions.map(a=><option key={a} value={a}>{a}</option>)}
                      </select>
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}>
                    <button onClick={addBuiltTask} disabled={!selectedBuiltTask} style={{padding:"8px 24px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:selectedBuiltTask?"#7A9C80":"#ccc",color:"#fff",cursor:selectedBuiltTask?"pointer":"default"}}>Save Task</button>
                  </div>
                </div>
                )}
              </div>
            )}

            {/* Outstanding / Completed filter */}
            <div style={{display:"flex",gap:6,marginBottom:16}}>
              {[{key:"outstanding",label:"Outstanding",count:outstanding.length},{key:"completed",label:"Completed",count:completed.length}].map(f=>(
                <button key={f.key} onClick={()=>setTaskFilter(f.key)} style={{padding:"7px 16px",fontSize:13,fontWeight:taskFilter===f.key?600:400,cursor:"pointer",borderRadius:6,border:taskFilter===f.key?"2px solid #7A9C80":"1px solid #d0d0d0",background:taskFilter===f.key?"#E7EAE5":"#fff",color:taskFilter===f.key?"#3d5c43":"#888",transition:"all 0.15s"}}>{f.label} ({f.count})</button>
              ))}
            </div>

            <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",overflow:"hidden"}}>

                <tbody>{_.orderBy(filtered,[t=>t.due||"9999"],["asc"]).map(task=>{
