                  return(<React.Fragment key={task.id}>
                  <tr style={{borderBottom:taskNotify===task.id?"none":"1px solid #f0f0f0"}} onMouseEnter={e=>e.currentTarget.style.background="#f2f3ef"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <td style={{padding:"12px 14px",width:36}}>
                      <div onClick={()=>toggleTask(task.id)} style={{width:20,height:20,borderRadius:4,border:"2px solid "+(task.status==="Completed"?"#7A9C80":"#ccc"),background:task.status==="Completed"?"#7A9C80":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                        {task.status==="Completed"&&<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                      </div>
                    </td>
                    <td style={{padding:"12px 14px",whiteSpace:"nowrap"}}>
                      <div style={{color:isOverdue?"#dc3545":"#555",fontWeight:isOverdue?600:400}}>{formatDate(task.due)}{isOverdue&&<span style={{fontSize:10,marginLeft:6,color:"#dc3545",fontWeight:700}}>OVERDUE</span>}</div>
                      {task.status==="Completed"&&task.completedDate&&<div style={{fontSize:11,color:"#7A9C80",marginTop:2}}>Completed {formatDate(task.completedDate)}</div>}
                    </td>
                    <td style={{padding:"12px 14px"}}>
                      <div style={{fontWeight:500,color:"#434343",textDecoration:task.status==="Completed"?"line-through":"none"}}>{task.title}</div>
                      {task.description&&<div style={{fontSize:12,color:"#888",marginTop:2}}>{task.description}</div>}
                      <div style={{display:"flex",gap:6,marginTop:4}}>
                        {isClientTask&&task.status!=="Completed"&&<button onClick={()=>setTaskNotify(taskNotify===task.id?null:task.id)} style={{fontSize:11,color:"#7A9C80",background:"none",border:"1px solid #7A9C80",borderRadius:4,padding:"2px 8px",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}><svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="#7A9C80" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>Send to Client</button>}
                        {task.status!=="Completed"&&<button onClick={()=>{setTab("documents");setTimeout(()=>{setOpenFolder("Requested Docs");setOpenSub(null);},50);}} style={{fontSize:11,color:"#7A9C80",background:"none",border:"1px solid #7A9C80",borderRadius:4,padding:"2px 8px",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}><svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#7A9C80" strokeWidth="2" fill="none"/><path d="M14 2v6h6" stroke="#7A9C80" strokeWidth="2"/></svg>Upload Docs</button>}
                      </div>
                    </td>
                    <td style={{padding:"12px 14px",color:"#555"}}>{task.assignee||"—"}{isClientTask&&<div style={{fontSize:10,color:"#7A9C80",fontWeight:600}}>CLIENT</div>}</td>
                    <td style={{padding:"12px 14px"}}><span style={{fontSize:11,fontWeight:600,color:task.status==="Completed"?"#3d5c43":"#856404",background:task.status==="Completed"?"#dce8de":"#fef3cd",padding:"2px 10px",borderRadius:4}}>{task.status}</span></td>
                    <td style={{padding:"12px 14px",width:36}}><button onClick={()=>deleteTask(task.id)} style={{background:"none",border:"none",cursor:"pointer",padding:4,opacity:0.4}} title="Delete task"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="3,6 5,6 21,6" stroke="#666" strokeWidth="1.5" strokeLinecap="round"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke="#666" strokeWidth="1.5" fill="none"/></svg></button></td>
                  </tr>
                  {taskNotify===task.id&&(
                    <tr style={{borderBottom:"1px solid #f0f0f0",background:"#f9faf8"}}>
                      <td colSpan={6} style={{padding:"12px 20px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#555"}}>
                          <span style={{fontWeight:600,color:"#434343"}}>Send task to {task.assignee}:</span>
                          <button onClick={()=>{const newComm={id:Date.now(),date:new Date().toISOString().split("T")[0],type:"Email",direction:"Outgoing",subject:"Task Assigned: "+task.title,body:"You have been assigned a task: "+task.title+(task.description?" — "+task.description:"")+(task.due?" (Due: "+task.due+")":""),to:task.assignee,email:clientContact.email||matter.email||""};update({communications:[newComm,...matter.communications]});setTaskNotify(null);}} style={{padding:"5px 14px",fontSize:12,fontWeight:500,border:"1px solid #d0d0d0",borderRadius:6,background:"#fff",color:"#434343",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2" stroke="#7A9C80" strokeWidth="1.5" fill="none"/><path d="M22 6L12 13 2 6" stroke="#7A9C80" strokeWidth="1.5"/></svg>Email</button>
                          <button onClick={()=>{const newComm={id:Date.now(),date:new Date().toISOString().split("T")[0],type:"Text",direction:"Outgoing",subject:"Task: "+task.title,body:"You have been assigned a task: "+task.title+(task.description?" — "+task.description:"")+(task.due?" (Due: "+task.due+")":""),to:task.assignee,phone:clientContact.phone||matter.phone||""};update({communications:[newComm,...matter.communications]});setTaskNotify(null);}} style={{padding:"5px 14px",fontSize:12,fontWeight:500,border:"1px solid #d0d0d0",borderRadius:6,background:"#fff",color:"#434343",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#1565C0" strokeWidth="1.5" fill="none"/></svg>Text</button>
                          <button onClick={()=>{const newComm={id:Date.now(),date:new Date().toISOString().split("T")[0],type:"Magic Link",direction:"Outgoing",subject:"Task: "+task.title,body:"You have been assigned a task: "+task.title+(task.description?" — "+task.description:"")+(task.due?" (Due: "+task.due+")":""),to:task.assignee,email:clientContact.email||matter.email||"",phone:clientContact.phone||matter.phone||"",channel:"magic-link"};update({communications:[newComm,...matter.communications]});setTaskNotify(null);}} style={{padding:"5px 14px",fontSize:12,fontWeight:500,border:"none",borderRadius:6,background:"linear-gradient(135deg,#7A9C80,#5a7e60)",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" stroke="#fff" strokeWidth="2" strokeLinecap="round"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg>Magic Link</button>
                          <button onClick={()=>setTaskNotify(null)} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#999"}}>Cancel</button>
                        </div>
                      </td>
                    </tr>
                  )}
                  </React.Fragment>);
                })}</tbody>
              </table>)}
            </div>
          </div>);
        })()}

        {tab==="communications"&&(()=>{
          const comms=matter.communications||[];
          const filtered=commFilter==="all"?comms:commFilter==="magic-link"?comms.filter(c=>c.type==="Magic Link"):comms.filter(c=>c.type.toLowerCase()===commFilter);
          const counts={all:comms.length,email:comms.filter(c=>c.type==="Email").length,text:comms.filter(c=>c.type==="Text").length,phone:comms.filter(c=>c.type==="Phone").length};
          const clientContact=matter.contacts.find(c=>c.role==="Client")||matter.contacts[0]||{};
          return(<div>
            {/* Magic Link Compose */}
            <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:showCompose?16:0}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#7A9C80,#5a7e60)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" stroke="#fff" strokeWidth="2" strokeLinecap="round"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg>
                  </div>
                  <div>
                    <div style={{fontSize:14,fontWeight:600,color:"#434343"}}>Magic Link</div>
                    <div style={{fontSize:12,color:"#888"}}>Sends email + text simultaneously to {clientContact.name||matter.clientFullName||"client"}</div>
                  </div>
                </div>
                <button onClick={()=>setShowCompose(!showCompose)} style={{padding:"8px 18px",fontSize:13,fontWeight:500,border:"none",borderRadius:6,background:showCompose?"#f0f0f0":"#7A9C80",color:showCompose?"#666":"#fff",cursor:"pointer"}}>{showCompose?"Cancel":"Compose"}</button>
              </div>
              {showCompose&&(
                <div style={{borderTop:"1px solid #eee",paddingTop:16}}>
                  <div style={{display:"flex",gap:16,marginBottom:12,fontSize:12,color:"#888"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2" stroke="#7A9C80" strokeWidth="1.5" fill="none"/><path d="M22 6L12 13 2 6" stroke="#7A9C80" strokeWidth="1.5"/></svg>
                      <strong style={{color:"#434343"}}>{clientContact.email||matter.email||"—"}</strong>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#7A9C80" strokeWidth="1.5" fill="none"/></svg>
                      <strong style={{color:"#434343"}}>{clientContact.phone||matter.phone||"—"}</strong>
                    </div>
                  </div>
                  <input value={composeSubject} onChange={e=>setComposeSubject(e.target.value)} placeholder="Subject" style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",marginBottom:8,boxSizing:"border-box"}}/>
                  <textarea value={composeMsg} onChange={e=>setComposeMsg(e.target.value)} placeholder="Write your message... (sent as both email and text)" rows={4} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
                    <div style={{fontSize:11,color:"#999"}}>This message will be delivered via email and text</div>
                    <button onClick={sendMessage} disabled={!composeMsg.trim()||!composeSubject.trim()} style={{padding:"8px 20px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:(composeMsg.trim()&&composeSubject.trim())?"#7A9C80":"#ccc",color:"#fff",cursor:(composeMsg.trim()&&composeSubject.trim())?"pointer":"default",display:"flex",alignItems:"center",gap:6}}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      Send via Magic Link
                    </button>
                  </div>
                </div>
              )}
            </div>

            {/* Quick Actions Row: Send Template, Start Sequence, Run Automation */}
            <div style={{display:"flex",gap:12,marginBottom:16}}>
              {/* Send Template Message */}
              <div style={{flex:1,background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:16}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:showSendTemplate?12:0,cursor:"pointer"}} onClick={()=>{setShowSendTemplate(!showSendTemplate);setShowStartSeq(false);setShowRunAuto(false);}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:"#F0FDF4",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke="#22C55E" strokeWidth="1.5" fill="none"/></svg>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#434343"}}>Send Template</div>
                    <div style={{fontSize:11,color:"#999"}}>{(msgTemplates||[]).length} template{(msgTemplates||[]).length!==1?"s":""}</div>
                  </div>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{transform:showSendTemplate?"rotate(180deg)":"rotate(0)",transition:"transform 0.15s"}}><path d="M6 9l6 6 6-6" stroke="#999" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                {showSendTemplate&&(
                  <div>
                    <select value={selectedTemplate} onChange={e=>setSelectedTemplate(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:12,outline:"none",background:"#fff",marginBottom:8}}>
                      <option value="">— Select a message template —</option>
                      {(msgTemplates||[]).map(m=><option key={m.id} value={m.id}>{m.title}</option>)}
                    </select>
                    {selectedTemplate&&(()=>{const tpl=(msgTemplates||[]).find(m=>String(m.id)===String(selectedTemplate));return tpl?<div style={{fontSize:11,color:"#888",marginBottom:8,padding:"6px 8px",background:"#f8fafc",borderRadius:4}}>{tpl.desc||tpl.body||"No description"}</div>:null;})()}
                    <button onClick={sendTemplate} disabled={!selectedTemplate} style={{width:"100%",padding:"7px 0",fontSize:12,fontWeight:600,border:"none",borderRadius:6,background:selectedTemplate?"#22C55E":"#ccc",color:"#fff",cursor:selectedTemplate?"pointer":"default"}}>Send Template</button>
                  </div>
                )}
              </div>

              {/* Start Sequence */}
              <div style={{flex:1,background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:16}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:showStartSeq?12:0,cursor:"pointer"}} onClick={()=>{setShowStartSeq(!showStartSeq);setShowSendTemplate(false);setShowRunAuto(false);}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:"#F5F3FF",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" stroke="#8B5CF6" strokeWidth="1.5" fill="none"/></svg>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#434343"}}>Start Sequence</div>
                    <div style={{fontSize:11,color:"#999"}}>{(matter.activeSequences||[]).length>0?<span style={{color:"#8B5CF6",fontWeight:600}}>{(matter.activeSequences||[]).length} active</span>:<span>{(seqTemplates||[]).length} sequence{(seqTemplates||[]).length!==1?"s":""}</span>}</div>
                  </div>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{transform:showStartSeq?"rotate(180deg)":"rotate(0)",transition:"transform 0.15s"}}><path d="M6 9l6 6 6-6" stroke="#999" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                {showStartSeq&&(
                  <div>
                    {(matter.activeSequences||[]).length>0&&(
                      <div style={{marginBottom:12}}>
                        <div style={{fontSize:11,fontWeight:600,color:"#8B5CF6",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6}}>Active Sequences</div>
                        {(matter.activeSequences||[]).map(as=>(
                          <div key={as.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:"#F5F3FF",borderRadius:6,marginBottom:4,border:"1px solid #E9E5FF"}}>
                            <div style={{width:6,height:6,borderRadius:"50%",background:"#8B5CF6",flexShrink:0}}></div>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:12,fontWeight:600,color:"#434343",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{as.title}</div>
                              <div style={{fontSize:10,color:"#888"}}>Started {as.startedDate?new Date(as.startedDate+"T12:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}):""}{as.steps?" \u00b7 "+as.steps+" steps":""}</div>
                            </div>
                            <button onClick={()=>stopSequence(as.id)} style={{background:"#FEE2E2",border:"1px solid #FECACA",cursor:"pointer",padding:"4px 10px",borderRadius:4,fontSize:11,fontWeight:600,color:"#DC2626",flexShrink:0,transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.background="#FCA5A5";e.currentTarget.style.color="#fff";}} onMouseLeave={e=>{e.currentTarget.style.background="#FEE2E2";e.currentTarget.style.color="#DC2626";}}>Delete</button>
                          </div>
                        ))}
                      </div>
                    )}
                    <div style={{fontSize:11,fontWeight:600,color:"#777",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6}}>Start New</div>
                    <select value={selectedSeq} onChange={e=>setSelectedSeq(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:12,outline:"none",background:"#fff",marginBottom:8}}>
                      <option value="">— Select a sequence —</option>
                      {(seqTemplates||[]).map(s=><option key={s.id} value={s.id}>{s.title}</option>)}
                    </select>
                    {selectedSeq&&(()=>{const seq=(seqTemplates||[]).find(s=>String(s.id)===String(selectedSeq));return seq?<div style={{fontSize:11,color:"#888",marginBottom:8,padding:"6px 8px",background:"#f8fafc",borderRadius:4}}>{seq.desc||"No description"}</div>:null;})()}
                    <button onClick={startSequence} disabled={!selectedSeq} style={{width:"100%",padding:"7px 0",fontSize:12,fontWeight:600,border:"none",borderRadius:6,background:selectedSeq?"#8B5CF6":"#ccc",color:"#fff",cursor:selectedSeq?"pointer":"default"}}>Start Sequence</button>
                  </div>
                )}
              </div>


              {/* Run Automation */}
              <div style={{flex:1,background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:16}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:showRunAuto?12:0,cursor:"pointer"}} onClick={()=>{setShowRunAuto(!showRunAuto);setShowSendTemplate(false);setShowStartSeq(false);}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:"#FFFBEB",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke="#F59E0B" strokeWidth="1.5" fill="none"/></svg>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#434343"}}>Run Automation</div>
                    <div style={{fontSize:11,color:"#999"}}>{(commAutomations||[]).length} automation{(commAutomations||[]).length!==1?"s":""}</div>
                  </div>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{transform:showRunAuto?"rotate(180deg)":"rotate(0)",transition:"transform 0.15s"}}><path d="M6 9l6 6 6-6" stroke="#999" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                {showRunAuto&&(
                  <div>
                    <select value={selectedAuto} onChange={e=>setSelectedAuto(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:12,outline:"none",background:"#fff",marginBottom:8}}>
                      <option value="">— Select an automation —</option>
                      {(commAutomations||[]).map(a=><option key={a.id} value={a.id}>{a.title}</option>)}
                    </select>
                    {selectedAuto&&(()=>{const auto=(commAutomations||[]).find(a=>String(a.id)===String(selectedAuto));return auto?<div style={{fontSize:11,color:"#888",marginBottom:8,padding:"6px 8px",background:"#f8fafc",borderRadius:4}}>{auto.desc||"No description"}</div>:null;})()}
                    <button onClick={runAutomation} disabled={!selectedAuto} style={{width:"100%",padding:"7px 0",fontSize:12,fontWeight:600,border:"none",borderRadius:6,background:selectedAuto?"#F59E0B":"#ccc",color:"#fff",cursor:selectedAuto?"pointer":"default"}}>Run Automation</button>
                  </div>
                )}
              </div>
            </div>

            {/* Filter bar */}
            <div style={{display:"flex",gap:6,marginBottom:16}}>
              {[{key:"all",label:"All"},{key:"email",label:"Email"},{key:"text",label:"Text"},{key:"magic-link",label:"Magic Link"},{key:"phone",label:"Phone"}].map(f=>(
                <button key={f.key} onClick={()=>setCommFilter(f.key)} style={{padding:"7px 16px",fontSize:13,fontWeight:commFilter===f.key?600:400,cursor:"pointer",borderRadius:6,border:commFilter===f.key?"2px solid #7A9C80":"1px solid #d0d0d0",background:commFilter===f.key?"#E7EAE5":"#fff",color:commFilter===f.key?"#3d5c43":"#888",transition:"all 0.15s"}}>{f.label} ({f.key==="magic-link"?comms.filter(c=>c.type==="Magic Link").length:counts[f.key]})</button>
              ))}
            </div>

            {/* Send Email compose */}
            {commFilter==="email"&&(
              <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:showEmailCompose?16:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:"#E7EAE5",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2" stroke="#7A9C80" strokeWidth="2" fill="none"/><path d="M22 6L12 13 2 6" stroke="#7A9C80" strokeWidth="2"/></svg>
                    </div>
                    <div>
                      <div style={{fontSize:14,fontWeight:600,color:"#434343"}}>Send Email</div>
                      <div style={{fontSize:12,color:"#888"}}>Email to {clientContact.email||matter.email||"client"}</div>
                    </div>
                  </div>
                  <button onClick={()=>setShowEmailCompose(!showEmailCompose)} style={{padding:"8px 18px",fontSize:13,fontWeight:500,border:"none",borderRadius:6,background:showEmailCompose?"#f0f0f0":"#7A9C80",color:showEmailCompose?"#666":"#fff",cursor:"pointer"}}>{showEmailCompose?"Cancel":"Compose"}</button>
                </div>
                {showEmailCompose&&(
                  <div style={{borderTop:"1px solid #eee",paddingTop:16}}>
                    <div style={{display:"flex",gap:16,marginBottom:12,fontSize:12,color:"#888"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontWeight:600,color:"#434343"}}>To:</span>
                        <strong style={{color:"#434343"}}>{clientContact.email||matter.email||"—"}</strong>
                      </div>
                    </div>
                    <input value={emailSubject} onChange={e=>setEmailSubject(e.target.value)} placeholder="Subject" style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",marginBottom:8,boxSizing:"border-box"}}/>
                    <textarea value={emailBody} onChange={e=>setEmailBody(e.target.value)} placeholder="Write your email..." rows={4} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
                    <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
                      <button onClick={sendEmail} disabled={!emailBody.trim()||!emailSubject.trim()} style={{padding:"8px 20px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:(emailBody.trim()&&emailSubject.trim())?"#7A9C80":"#ccc",color:"#fff",cursor:(emailBody.trim()&&emailSubject.trim())?"pointer":"default",display:"flex",alignItems:"center",gap:6}}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        Send Email
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Send Text compose */}
            {commFilter==="text"&&(
              <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:showTextCompose?16:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:"#E3F2FD",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#1565C0" strokeWidth="2" fill="none"/></svg>
                    </div>
                    <div>
                      <div style={{fontSize:14,fontWeight:600,color:"#434343"}}>Send Text</div>
                      <div style={{fontSize:12,color:"#888"}}>Text to {clientContact.phone||matter.phone||"client"}</div>
                    </div>
                  </div>
                  <button onClick={()=>setShowTextCompose(!showTextCompose)} style={{padding:"8px 18px",fontSize:13,fontWeight:500,border:"none",borderRadius:6,background:showTextCompose?"#f0f0f0":"#7A9C80",color:showTextCompose?"#666":"#fff",cursor:"pointer"}}>{showTextCompose?"Cancel":"Compose"}</button>
                </div>
                {showTextCompose&&(
                  <div style={{borderTop:"1px solid #eee",paddingTop:16}}>
                    <div style={{display:"flex",gap:16,marginBottom:12,fontSize:12,color:"#888"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontWeight:600,color:"#434343"}}>To:</span>
                        <strong style={{color:"#434343"}}>{clientContact.phone||matter.phone||"—"}</strong>
                      </div>
                    </div>
                    <textarea value={textBody} onChange={e=>setTextBody(e.target.value)} placeholder="Write your text message..." rows={3} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
                    <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
                      <button onClick={sendText} disabled={!textBody.trim()} style={{padding:"8px 20px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:textBody.trim()?"#7A9C80":"#ccc",color:"#fff",cursor:textBody.trim()?"pointer":"default",display:"flex",alignItems:"center",gap:6}}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        Send Text
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Log Phone Call */}
            {commFilter==="phone"&&(
              <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:showPhoneLog?16:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:"#dce8de",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92z" stroke="#5a7e60" strokeWidth="2" fill="none"/></svg>
                    </div>
                    <div>
                      <div style={{fontSize:14,fontWeight:600,color:"#434343"}}>Log Phone Call</div>
                      <div style={{fontSize:12,color:"#888"}}>Record notes from a phone call with {clientContact.name||matter.clientFullName||"client"}</div>
                    </div>
                  </div>
                  <button onClick={()=>setShowPhoneLog(!showPhoneLog)} style={{padding:"8px 18px",fontSize:13,fontWeight:500,border:"none",borderRadius:6,background:showPhoneLog?"#f0f0f0":"#7A9C80",color:showPhoneLog?"#666":"#fff",cursor:"pointer"}}>{showPhoneLog?"Cancel":"Log Call"}</button>
                </div>
                {showPhoneLog&&(
                  <div style={{borderTop:"1px solid #eee",paddingTop:16}}>
                    <div style={{display:"flex",gap:16,marginBottom:12,fontSize:12,color:"#888"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontWeight:600,color:"#434343"}}>With:</span>
                        <strong style={{color:"#434343"}}>{clientContact.name||matter.clientFullName||"—"}</strong>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontWeight:600,color:"#434343"}}>Phone:</span>
                        <strong style={{color:"#434343"}}>{clientContact.phone||matter.phone||"—"}</strong>
                      </div>
                    </div>
                    <div style={{marginBottom:8}}>
                      <input value={phoneDuration} onChange={e=>setPhoneDuration(e.target.value)} placeholder="Duration (e.g. 15 min)" style={{width:200,padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                    </div>
                    <textarea value={phoneNote} onChange={e=>setPhoneNote(e.target.value)} placeholder="Call notes... what was discussed?" rows={4} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
                    <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
                      <button onClick={logPhoneCall} disabled={!phoneNote.trim()} style={{padding:"8px 20px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:phoneNote.trim()?"#7A9C80":"#ccc",color:"#fff",cursor:phoneNote.trim()?"pointer":"default",display:"flex",alignItems:"center",gap:6}}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        Save Call Log
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Communication list */}
            <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",overflow:"hidden"}}>
              {filtered.length===0?<div style={{padding:40,textAlign:"center",color:"#999"}}>No {commFilter==="all"?"communications":commFilter+" messages"} logged.</div>:
              filtered.map((c,i)=>(
                <div key={c.id} style={{display:"flex",gap:16,padding:"16px 20px",borderBottom:i<filtered.length-1?"1px solid #f0f0f0":"none"}} onMouseEnter={e=>e.currentTarget.style.background="#f2f3ef"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <div style={{width:38,height:38,borderRadius:"50%",background:c.type==="Magic Link"?"linear-gradient(135deg,#E7EAE5,#dce8de)":c.type==="Email"?"#E7EAE5":c.type==="Text"?"#E3F2FD":c.type==="Phone"?"#dce8de":"#f3e8ff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                      {c.type==="Magic Link"?<><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" stroke="#3d5c43" strokeWidth="1.8" strokeLinecap="round"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" stroke="#3d5c43" strokeWidth="1.8" strokeLinecap="round"/></>:
                       c.type==="Email"?<><rect x="2" y="4" width="20" height="16" rx="2" stroke="#7A9C80" strokeWidth="1.5" fill="none"/><path d="M22 6L12 13 2 6" stroke="#7A9C80" strokeWidth="1.5"/></>:
                       c.type==="Text"?<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#1565C0" strokeWidth="1.5" fill="none"/>:
                       c.type==="Phone"?<path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92z" stroke="#5a7e60" strokeWidth="1.5" fill="none"/>:
                       <><circle cx="12" cy="7" r="4" stroke="#8b5cf6" strokeWidth="1.5" fill="none"/><path d="M4 21v-2a4 4 0 014-4h8a4 4 0 014 4v2" stroke="#8b5cf6" strokeWidth="1.5" fill="none"/></>}
                    </svg>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:14,fontWeight:500,color:"#434343"}}>{c.subject}</span>
                        {c.type==="Magic Link"&&<span style={{fontSize:10,fontWeight:600,background:"linear-gradient(135deg,#E7EAE5,#dce8de)",color:"#3d5c43",padding:"2px 8px",borderRadius:10,display:"flex",alignItems:"center",gap:3}}><svg width="10" height="10" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2" stroke="#3d5c43" strokeWidth="2" fill="none"/></svg>+<svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#3d5c43" strokeWidth="2" fill="none"/></svg></span>}
                        {c.automated&&<span style={{fontSize:10,fontWeight:600,background:"#FFFBEB",color:"#92400E",padding:"2px 8px",borderRadius:10,border:"1px solid #FCD34D",display:"flex",alignItems:"center",gap:4}}><svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke="#92400E" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>Auto</span>}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:12,color:"#999",whiteSpace:"nowrap"}}>{c.date?new Date(c.date+"T12:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}):""}</span>
                        <button onClick={async()=>{if(await confirm({title:"Delete Communication",message:"Delete this communication entry?",confirmLabel:"Delete"})){update({communications:matter.communications.filter(x=>x.id!==c.id),activeSequences:c.subject&&c.subject.startsWith("Sequence started:")?(matter.activeSequences||[]).filter(s=>s.title!==c.subject.replace("Sequence started: ","")):(matter.activeSequences||[])});}}} style={{background:"none",border:"none",cursor:"pointer",padding:4,opacity:0.4}} title="Delete communication"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="3,6 5,6 21,6" stroke="#666" strokeWidth="1.5" strokeLinecap="round"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke="#666" strokeWidth="1.5" fill="none"/></svg></button>
                      </div>
                    </div>
                    <div style={{fontSize:13,color:"#888"}}>{c.type==="Magic Link"?"Email + Text · "+c.direction+(c.to?" · "+c.to:""):(c.type+(c.direction!=="N/A"?" · "+c.direction:"")+(c.from?" · "+c.from:"")+(c.to?" · "+c.to:"")+(c.duration?" · "+c.duration:""))}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>);
        })()}

        {tab==="calendar"&&(()=>{
          const today=new Date().toISOString().split("T")[0];
          const events=[...(matter.calendarEvents||[])].sort((a,b)=>a.date.localeCompare(b.date));
          const upcoming=events.filter(ev=>ev.date>=today);
          const past=events.filter(ev=>ev.date<today);
          const filtered=calFilter==="upcoming"?upcoming:calFilter==="past"?past:events;
          return(<div>
            {/* Header with New Event button */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{fontSize:16,fontWeight:600,color:"#434343",margin:0}}>Calendar Events</h3>
              <button onClick={()=>setShowNewEvent(!showNewEvent)} style={{padding:"8px 20px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:showNewEvent?"#f0f0f0":"#7A9C80",color:showNewEvent?"#666":"#fff",cursor:"pointer"}}>{showNewEvent?"Cancel":"New Event"}</button>
            </div>

            {/* New Event Form */}
            {showNewEvent&&(
              <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,marginBottom:16}}>
                <div style={{fontSize:14,fontWeight:600,color:"#434343",marginBottom:16}}>Create New Event</div>
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div>
                    <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Title</label>
                    <input value={newEvTitle} onChange={e=>setNewEvTitle(e.target.value)} placeholder="Event title..." style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,color:"#434343",cursor:"pointer"}}>
                      <input type="checkbox" checked={newEvAllDay} onChange={e=>setNewEvAllDay(e.target.checked)} style={{accentColor:"#7A9C80"}}/>
                      All day
                    </label>
                  </div>
                  <div style={{display:"flex",gap:12}}>
                    <div style={{flex:1}}>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Start Date</label>
                      <input type="date" value={newEvStartDate} onChange={e=>{setNewEvStartDate(e.target.value);if(!newEvEndDate)setNewEvEndDate(e.target.value);}} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                    </div>
                    {!newEvAllDay&&<div style={{flex:1}}>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Start Time</label>
                      <input type="time" value={newEvStartTime} onChange={e=>setNewEvStartTime(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                    </div>}
                    <div style={{flex:1}}>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>End Date</label>
                      <input type="date" value={newEvEndDate} onChange={e=>setNewEvEndDate(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                    </div>
                    {!newEvAllDay&&<div style={{flex:1}}>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>End Time</label>
                      <input type="time" value={newEvEndTime} onChange={e=>setNewEvEndTime(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                    </div>}
                  </div>
                  <div style={{display:"flex",gap:12}}>
                    <div style={{flex:1}}>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Location</label>
                      <input value={newEvLocation} onChange={e=>setNewEvLocation(e.target.value)} placeholder="Location (optional)" style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                    </div>
                  </div>
                  <div>
                    <label style={{display:"block",fontSize:12,color:"#888",marginBottom:6}}>Assign To</label>
                    <div style={{display:"flex",gap:6}}>
                      {[{name:"Matt McCune",color:"#7a9c80"},{name:"Bob Stevens",color:"#214e5f"},{name:"Angie Sullivan",color:"#e67e22"},{name:"Andrea Rubino",color:"#8e44ad"}].map(u=>(
                        <button key={u.name} onClick={()=>setNewEvAssignee(u.name)} style={{padding:"6px 14px",fontSize:12,fontWeight:newEvAssignee===u.name?600:400,border:newEvAssignee===u.name?"2px solid "+u.color:"1px solid #d0d0d0",borderRadius:6,background:newEvAssignee===u.name?u.color+"18":"#fff",color:newEvAssignee===u.name?u.color:"#888",cursor:"pointer",transition:"all 0.15s"}}>{u.name.split(" ")[0]}</button>
                      ))}
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}>
                    <button onClick={addEvent} disabled={!newEvTitle.trim()||!newEvStartDate} style={{padding:"8px 24px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:(newEvTitle.trim()&&newEvStartDate)?"#7A9C80":"#ccc",color:"#fff",cursor:(newEvTitle.trim()&&newEvStartDate)?"pointer":"default"}}>Save Event</button>
                  </div>
                </div>
              </div>
            )}

            {/* Filter bar */}
            <div style={{display:"flex",gap:6,marginBottom:16}}>
              {[{key:"upcoming",label:"Upcoming",count:upcoming.length},{key:"past",label:"Past",count:past.length},{key:"all",label:"All",count:events.length}].map(f=>(
                <button key={f.key} onClick={()=>setCalFilter(f.key)} style={{padding:"7px 16px",fontSize:13,fontWeight:calFilter===f.key?600:400,cursor:"pointer",borderRadius:6,border:calFilter===f.key?"2px solid #7A9C80":"1px solid #d0d0d0",background:calFilter===f.key?"#E7EAE5":"#fff",color:calFilter===f.key?"#3d5c43":"#888",transition:"all 0.15s"}}>{f.label} ({f.count})</button>
              ))}
            </div>

            {/* Events table */}
            <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",overflow:"hidden"}}>
              {filtered.length===0?<div style={{padding:40,textAlign:"center",color:"#999"}}>{calFilter==="upcoming"?"No upcoming events.":calFilter==="past"?"No past events.":"No events."}</div>:(
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr style={{background:"#FBFAF7",borderBottom:"1px solid #e0e0e0"}}>
                  {["Start Date","Start Time","End Date","End Time","Title","Assignee","Location",""].map(h=><th key={h} style={{textAlign:"left",padding:"10px 14px",color:"#666",fontWeight:600,fontSize:12,textTransform:"uppercase",letterSpacing:0.5}}>{h}</th>)}
                </tr></thead>
                <tbody>{filtered.map(ev=>{
                  const formatDate=(d)=>{if(!d)return"—";const dt=new Date(d+"T12:00:00");return dt.toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"});};
                  const formatTime=(t,allDay)=>{if(allDay||t==="All day")return"All day";if(!t)return"—";try{const[h,m]=t.split(":");const hr=parseInt(h);return(hr>12?hr-12:hr||12)+":"+m+(hr>=12?" PM":" AM");}catch{return t;}};
                  return(<tr key={ev.id} style={{borderBottom:"1px solid #f0f0f0",opacity:ev.date<today?0.6:1}} onMouseEnter={e=>e.currentTarget.style.background="#f2f3ef"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <td style={{padding:"12px 14px"}}>{formatDate(ev.date)}</td>
                    <td style={{padding:"12px 14px"}}>{formatTime(ev.time,ev.allDay)}</td>
                    <td style={{padding:"12px 14px"}}>{formatDate(ev.endDate||ev.date)}</td>
                    <td style={{padding:"12px 14px"}}>{formatTime(ev.endTime,ev.allDay)}</td>
                    <td style={{padding:"12px 14px",fontWeight:500,color:"#434343"}}>{ev.title}</td>
                    <td style={{padding:"12px 14px",color:"#555"}}>{ev.assignee||"—"}</td>
                    <td style={{padding:"12px 14px",color:"#888"}}>{ev.location||"—"}</td>
                    <td style={{padding:"12px 14px"}}><button onClick={()=>deleteEvent(ev.id)} style={{background:"none",border:"none",cursor:"pointer",padding:4,opacity:0.4}} title="Delete event"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="3,6 5,6 21,6" stroke="#666" strokeWidth="1.5" strokeLinecap="round"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke="#666" strokeWidth="1.5" fill="none"/></svg></button></td>
                  </tr>);
                })}</tbody>
              </table>)}
            </div>
          </div>);
        })()}

        {tab==="accounting"&&(()=>{
          const acctData=matter.accounting||{trust:[],operating:[]};
          const trustEntries=acctData.trust||[];
          const opEntries=acctData.operating||[];
          const trustBalance=trustEntries.reduce((sum,e)=>e.type.includes("Received")||e.type==="Transfer from Operating"?sum+e.amount:sum-e.amount,0);
          const opBalance=opEntries.reduce((sum,e)=>e.type.includes("Received")||e.type==="Transfer from Trust"?sum+e.amount:sum-e.amount,0);
          const addAcctEntry=()=>{
            if(!acctEntryAmount||!acctEntryDesc.trim())return;
            const amt=parseFloat(acctEntryAmount);
            const entry={id:Date.now(),date:acctEntryDate,type:acctEntryType,amount:amt,description:acctEntryDesc,addedBy:"Matt McCune"};
            const updated={trust:[...(acctData.trust||[])],operating:[...(acctData.operating||[])]};
            if(acctEntryType==="Transfer: Trust → Operating"){
              updated.trust=[{...entry,type:"Transfer to Operating"},...updated.trust];
              updated.operating=[{...entry,id:Date.now()+1,type:"Transfer from Trust"},...updated.operating];
            }else if(acctEntryType==="Transfer: Operating → Trust"){
              updated.operating=[{...entry,type:"Transfer to Trust"},...updated.operating];
              updated.trust=[{...entry,id:Date.now()+1,type:"Transfer from Operating"},...updated.trust];
            }else if(acctEntryType==="Funds Received into Trust"){
              updated.trust=[{...entry,type:"Funds Received"},...updated.trust];
            }else if(acctEntryType==="Funds Disbursed from Trust"){
              updated.trust=[{...entry,type:"Funds Disbursed"},...updated.trust];
            }else if(acctEntryType==="Funds Received into Operating"){
              updated.operating=[{...entry,type:"Funds Received"},...updated.operating];
            }else if(acctEntryType==="Funds Disbursed from Operating"){
              updated.operating=[{...entry,type:"Funds Disbursed"},...updated.operating];
            }
            update({accounting:updated});
            setAcctEntryAmount("");setAcctEntryDesc("");setAcctEntryType("Funds Received into Trust");setShowAcctEntry(false);
          };
          const allEntries=[...trustEntries.map(e=>({...e,account:"Trust"})),...opEntries.map(e=>({...e,account:"Operating"}))].sort((a,b)=>b.id-a.id);
          const displayEntries=acctTab==="trust"?trustEntries:acctTab==="operating"?opEntries:allEntries;
          const displayBalance=acctTab==="trust"?trustBalance:acctTab==="operating"?opBalance:null;
          return(
          <div>
            <div style={{display:"flex",gap:0,marginBottom:16,borderRadius:8,overflow:"hidden",border:"1px solid #d0d0d0",width:"fit-content"}}>
              <button onClick={()=>setAcctTab("trust")} style={{padding:"10px 24px",fontSize:13,fontWeight:600,border:"none",cursor:"pointer",background:acctTab==="trust"?"#7a9c80":"#fff",color:acctTab==="trust"?"#fff":"#434343"}}>Trust</button>
              <button onClick={()=>setAcctTab("operating")} style={{padding:"10px 24px",fontSize:13,fontWeight:600,border:"none",cursor:"pointer",background:acctTab==="operating"?"#7a9c80":"#fff",color:acctTab==="operating"?"#fff":"#434343",borderLeft:"1px solid #d0d0d0"}}>Operating</button>
              <button onClick={()=>setAcctTab("all")} style={{padding:"10px 24px",fontSize:13,fontWeight:600,border:"none",cursor:"pointer",background:acctTab==="all"?"#7a9c80":"#fff",color:acctTab==="all"?"#fff":"#434343",borderLeft:"1px solid #d0d0d0"}}>All Transactions</button>
            </div>
            <div style={{display:"flex",gap:16,marginBottom:16}}>
              <div style={{flex:1,background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:"16px 20px"}}>
                <div style={{fontSize:12,color:"#888",fontWeight:500,textTransform:"uppercase",letterSpacing:0.5}}>Trust Balance</div>
                <div style={{fontSize:20,fontWeight:700,color:trustBalance>=0?"#3d5c43":"#c0392b"}}>{fmtDec(trustBalance)}</div>
              </div>
              <div style={{flex:1,background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:"16px 20px"}}>
                <div style={{fontSize:12,color:"#888",fontWeight:500,textTransform:"uppercase",letterSpacing:0.5}}>Operating Balance</div>
                <div style={{fontSize:20,fontWeight:700,color:opBalance>=0?"#3d5c43":"#c0392b"}}>{fmtDec(opBalance)}</div>
              </div>
            </div>
            <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",overflow:"hidden"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 20px",borderBottom:"1px solid #e0e0e0",background:"#FBFAF7"}}>
                <div style={{fontSize:14,fontWeight:600,color:"#434343"}}>{acctTab==="trust"?"Trust Account":acctTab==="operating"?"Operating Account":"All Transactions"}</div>
                <button onClick={()=>setShowAcctEntry(true)} style={{padding:"8px 16px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:"#7a9c80",color:"#fff",cursor:"pointer"}}>+ New Entry</button>
              </div>
              {showAcctEntry&&(
                <div style={{padding:20,borderBottom:"1px solid #e0e0e0",background:"#f9faf8"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
                    <div>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Type</label>
                      <select value={acctEntryType} onChange={e=>setAcctEntryType(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,background:"#fff"}}>
                        <optgroup label="Trust Account">
                          <option>Funds Received into Trust</option>
                          <option>Funds Disbursed from Trust</option>
                        </optgroup>
                        <optgroup label="Operating Account">
                          <option>Funds Received into Operating</option>
                          <option>Funds Disbursed from Operating</option>
                        </optgroup>
                        <optgroup label="Transfer Between Accounts">
                          <option>Transfer: Trust → Operating</option>
                          <option>Transfer: Operating → Trust</option>
                        </optgroup>
                      </select>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Amount</label>
                      <input type="number" value={acctEntryAmount} onChange={e=>setAcctEntryAmount(e.target.value)} placeholder="0.00" style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Date</label>
                      <input type="date" value={acctEntryDate} onChange={e=>setAcctEntryDate(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                    </div>
                  </div>
                  <div style={{marginBottom:12}}>
                    <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Description</label>
                    <input value={acctEntryDesc} onChange={e=>setAcctEntryDesc(e.target.value)} placeholder="Payment description..." style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                  </div>
                  <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                    <button onClick={()=>setShowAcctEntry(false)} style={{padding:"8px 16px",fontSize:12,border:"1px solid #d0d0d0",borderRadius:6,background:"#fff",color:"#434343",cursor:"pointer"}}>Cancel</button>
                    <button onClick={addAcctEntry} style={{padding:"8px 16px",fontSize:12,border:"none",borderRadius:6,background:"#7a9c80",color:"#fff",cursor:"pointer",fontWeight:600}}>Save Entry</button>
                  </div>
                </div>
              )}
              {displayEntries.length>0?(
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr style={{background:"#FBFAF7",borderBottom:"1px solid #e0e0e0"}}>
                    {(acctTab==="all"?["Date","Account","Type","Description","Amount","Added By"]:["Date","Type","Description","Amount","Added By"]).map(h=><th key={h} style={{textAlign:"left",padding:"10px 14px",color:"#666",fontWeight:600,fontSize:12,textTransform:"uppercase",letterSpacing:0.5}}>{h}</th>)}
                  </tr></thead>
                  <tbody>{displayEntries.map(e=>{
                    const isCredit=e.type==="Funds Received"||e.type==="Transfer from Trust"||e.type==="Transfer from Operating";
                    const typeBg=isCredit?"#dce8de":e.type.includes("Transfer")?"#e8f4fd":"#fde8e8";
                    const typeColor=isCredit?"#3d5c43":e.type.includes("Transfer")?"#1a73e8":"#c0392b";
                    return(
                    <tr key={e.id} style={{borderBottom:"1px solid #f0f0f0"}} onMouseEnter={ev=>ev.currentTarget.style.background="#f2f3ef"} onMouseLeave={ev=>ev.currentTarget.style.background="transparent"}>
                      <td style={{padding:"12px 14px"}}>{new Date(e.date+"T12:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"})}</td>
                      {acctTab==="all"&&<td style={{padding:"12px 14px"}}><span style={{padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600,background:e.account==="Trust"?"#f0e6ff":"#fff3e0",color:e.account==="Trust"?"#6a1b9a":"#e65100"}}>{e.account}</span></td>}
                      <td style={{padding:"12px 14px"}}><span style={{padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600,background:typeBg,color:typeColor}}>{e.type}</span></td>
                      <td style={{padding:"12px 14px",color:"#555"}}>{e.description}</td>
                      <td style={{padding:"12px 14px",fontWeight:600,color:isCredit?"#3d5c43":"#c0392b"}}>{isCredit?"+":"-"}{fmtDec(e.amount)}</td>
                      <td style={{padding:"12px 14px",color:"#888"}}>{e.addedBy}</td>
                    </tr>);
                  })}</tbody>
                </table>
              ):(
                <div style={{padding:40,textAlign:"center",color:"#999"}}>
                  <p style={{fontSize:13}}>No entries recorded.</p>
                </div>
              )}
            </div>
          </div>);
        })()}

        {tab==="ai"&&(<AITab item={matter} isLead={false} update={update}/>)}

        {taskNotifyPopup&&(
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
            <div style={{background:"#fff",borderRadius:12,padding:"32px 36px",maxWidth:420,width:"90%",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
              <h3 style={{fontSize:16,fontWeight:700,color:"#434343",marginBottom:8}}>Notify Client</h3>
              <p style={{fontSize:13,color:"#666",marginBottom:20,lineHeight:1.5}}>Task <strong>"{taskNotifyPopup.title}"</strong> has been assigned to <strong>{taskNotifyPopup.assignee}</strong>. How would you like to notify them?</p>
              <div style={{display:"flex",gap:10,marginBottom:16}}>
                <button onClick={()=>{alert("Email notification sent to "+taskNotifyPopup.assignee);setTaskNotifyPopup(null);}} style={{flex:1,padding:"10px 16px",fontSize:13,fontWeight:600,border:"1px solid #d0d0d0",borderRadius:6,background:"#fff",color:"#434343",cursor:"pointer"}}>Email</button>
                <button onClick={()=>{alert("Text notification sent to "+taskNotifyPopup.assignee);setTaskNotifyPopup(null);}} style={{flex:1,padding:"10px 16px",fontSize:13,fontWeight:600,border:"1px solid #d0d0d0",borderRadius:6,background:"#fff",color:"#434343",cursor:"pointer"}}>Text</button>
                <button onClick={()=>{alert("Magic Link sent to "+taskNotifyPopup.assignee);setTaskNotifyPopup(null);}} style={{flex:1,padding:"10px 16px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:"#7a9c80",color:"#fff",cursor:"pointer"}}>Magic Link</button>
              </div>
              <button onClick={()=>setTaskNotifyPopup(null)} style={{width:"100%",padding:"8px",fontSize:12,color:"#888",background:"none",border:"none",cursor:"pointer"}}>Skip — Don't notify</button>
            </div>
          </div>
