      notes:lead.notes&&lead.notes.length?[{id:1,date:new Date().toISOString().split("T")[0],author:"System",content:"Converted from lead."}]:[],
      documents:[...(lead.documents||[])],tasks:[...(lead.tasks||[])],communications:[...(lead.communications||[])],timeEntries:[],calendarEvents:[...(lead.calendarEvents||[])],
      timeline:[{id:1,date:new Date().toISOString().split("T")[0],action:"Matter created",detail:"Converted from lead — "+lead.lastName+" "+lead.bankruptcyType,user:"Matt McCune"}]
    };
    setMatters(prev=>[...prev,newMatter]);
    setLeads(prev=>prev.filter(l=>l.id!==lead.id));
    setShowHiredConfirm(false);
    setSelectedMatter(newMatter.id);
    setPage("matter-detail");
  };

  const tabs=[{key:"dashboard",label:"Dashboard"},{key:"calendar",label:"Calendar"},{key:"communications",label:"Communications"},{key:"notes",label:"Notes"},{key:"documents",label:"Documents"},{key:"tasks",label:"Tasks"},{key:"accounting",label:"Accounting"},{key:"ai",label:"AI"}];

  const updateCF=(key,val)=>update({customFields:{...lead.customFields,[key]:val}});
  const EditVal=({field,value,isCF})=>{
    if(editField===field) return(
      <span style={{display:"inline-flex",gap:6,alignItems:"center"}}>
        <input value={editVal} onChange={e=>setEditVal(e.target.value)} autoFocus onKeyDown={e=>e.key==="Enter"&&saveEdit(field,isCF)} style={{padding:"4px 8px",borderRadius:4,border:"1px solid #7A9C80",fontSize:13,outline:"none",width:200}}/>
        <button onClick={()=>saveEdit(field,isCF)} style={{background:"#7A9C80",color:"#fff",border:"none",borderRadius:4,padding:"4px 10px",fontSize:12,cursor:"pointer"}}>Save</button>
        <button onClick={()=>setEditField(null)} style={{background:"#f0f0f0",border:"none",borderRadius:4,padding:"4px 10px",fontSize:12,cursor:"pointer"}}>Cancel</button>
      </span>);
    return <span onClick={()=>{setEditField(field);setEditVal(value||"");}} style={{cursor:"pointer"}} title="Click to edit">{value||"—"}</span>;
  };

  const startEdit=(f,v)=>{setEditField(f);setEditVal(v||"");};
  const saveEdit=(f,isCF)=>{if(isCF)updateCF(f,editVal);else update({[f]:editVal});setEditField(null);};

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:"100vh"}}>
      <div style={{background:"#fff",borderBottom:"1px solid #e0e0e0",padding:"20px 28px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}>
          <button onClick={()=>{setPage("leads");setSelectedLead(null);}} style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex"}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="#7A9C80" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg></button>
          <h1 style={{fontSize:22,fontWeight:700,color:"#434343",margin:0}}>{lead.firstName} {lead.lastName}</h1>
          <StageBadge stage={lead.leadStage}/>
        </div>
        <p style={{color:"#666",fontSize:13,marginBottom:16,paddingLeft:32}}>{lead.bankruptcyType} Lead</p>
        {tab==="dashboard"&&<div style={{display:"flex",gap:8,marginBottom:16,paddingLeft:32}}>
          <button style={{padding:"7px 16px",borderRadius:6,fontSize:13,fontWeight:500,cursor:"pointer",background:"#fff",color:"#434343",border:"1px solid #d0d0d0"}}>Share</button>
          <button onClick={()=>openEdit(lead)} style={{padding:"7px 16px",borderRadius:6,fontSize:13,fontWeight:500,cursor:"pointer",background:"#7A9C80",color:"#fff",border:"none"}}>Edit Lead</button>
        </div>}
        <div style={{display:"flex",gap:0,overflowX:"auto",paddingLeft:32}}>
          {tabs.map(t=><button key={t.key} onClick={()=>setTab(t.key)} style={{padding:"10px 18px",fontSize:13,fontWeight:tab===t.key?600:400,cursor:"pointer",color:tab===t.key?"#7A9C80":"#666",background:"none",border:"none",borderBottom:tab===t.key?"3px solid #7A9C80":"3px solid transparent",whiteSpace:"nowrap"}}>{t.label}</button>)}
        </div>
      </div>

      <div style={{padding:"20px 28px",flex:1,background:"#FBFAF7",overflowY:"auto"}}>
        {tab==="dashboard"&&(<div>
          <Widget title="Lead Details">
            <DetailRow label="First name" value={lead.firstName}/>
            <DetailRow label="Last name" value={lead.lastName}/>
            <DetailRow label="Email" value={<span style={{userSelect:"all",cursor:"text"}}>{lead.email}</span>}/>
            <DetailRow label="Phone" value={<span style={{userSelect:"all",cursor:"text"}}>{lead.phone}</span>}/>
            <DetailRow label="Bankruptcy type" value={<select value={lead.bankruptcyType} onChange={e=>update({bankruptcyType:e.target.value})} style={{padding:"4px 8px",borderRadius:4,border:"1px solid #d0d0d0",fontSize:13,background:"#fff"}}>{BANKRUPTCY_TYPES.map(t=><option key={t}>{t}</option>)}</select>}/>
            <DetailRow label="Lead stage" value={<select value={lead.leadStage} onChange={e=>handleLeadStageChange(e.target.value)} style={{padding:"4px 8px",borderRadius:4,border:"1px solid #d0d0d0",fontSize:13,background:"#fff"}}>{dynamicLeadStages.map(s=><option key={s} value={s}>{s==="Hired"?"Hired = Matter":s}</option>)}</select>}/>
            <DetailRow label="Created" value={lead.createdDate?new Date(lead.createdDate+"T12:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}):""}/>
            <DetailRow label="Notes" value={<EditVal field="leadNotes" value={lead.leadNotes}/>}/>
            <DetailRow label="Funds in Trust" value={<span style={{fontWeight:600,color:"#3d5c43"}}>{fmtDec((lead.accounting||{trust:[]}).trust.reduce((sum,e)=>e.type.includes("Received")||e.type==="Transfer from Operating"?sum+e.amount:sum-e.amount,0))}</span>}/>
          </Widget>
          <Widget title="Contacts">
            {lead.contacts.map(c=>(<div key={c.id} style={{display:"flex",alignItems:"center",gap:14,padding:"10px 0",borderBottom:"1px solid #f5f5f5"}}>
              <div style={{width:38,height:38,borderRadius:"50%",background:"#E7EAE5",color:"#7A9C80",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:600}}>{c.name.split(" ").map(n=>n[0]).join("").slice(0,2)}</div>
              <div style={{flex:1}}><div onClick={()=>{setSelectedContact({id:c.id,source:"Lead",sourceId:lead.id});setPage("contact-detail");}} style={{fontSize:14,fontWeight:500,color:"#7A9C80",cursor:"pointer",textDecoration:"none"}} onMouseEnter={e=>e.currentTarget.style.textDecoration="underline"} onMouseLeave={e=>e.currentTarget.style.textDecoration="none"}>{c.name}</div></div>
              <div style={{fontSize:14,color:"#555",userSelect:"all",cursor:"text"}}>{c.email}</div>
              <div style={{fontSize:14,color:"#555",userSelect:"all",cursor:"text"}}>{c.phone}</div>
            </div>))}
          </Widget>
          <Widget title="Custom Fields">
            {leadCF.map(f=>(
              <div key={f.key} style={{padding:"12px 0",borderBottom:"1px solid #f5f5f5"}}><div style={{fontSize:13,fontWeight:600,color:"#434343",marginBottom:4}}>{f.label}</div><div style={{fontSize:14,color:"#555"}}><EditVal field={f.key} value={(lead.customFields||{})[f.key]} isCF/></div></div>
            ))}
            {leadCF.length===0&&<div style={{padding:12,color:"#999",fontSize:13}}>No custom fields configured for leads.</div>}
          </Widget>
        </div>)}

        {tab==="notes"&&(<div>
          <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,marginBottom:16}}>
            <textarea value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="Add a note..." rows={3} style={{width:"100%",padding:12,borderRadius:6,border:"1px solid #d0d0d0",fontSize:14,outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}><button onClick={addNote} disabled={!newNote.trim()} style={{background:newNote.trim()?"#7A9C80":"#ccc",color:"#fff",border:"none",borderRadius:6,padding:"8px 20px",fontSize:13,cursor:newNote.trim()?"pointer":"default"}}>Save Note</button></div>
          </div>
          {lead.notes.map(n=>(<div key={n.id} style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:14,fontWeight:600,color:"#434343"}}>{n.author}</span><span style={{fontSize:12,color:"#999"}}>{n.date?new Date(n.date+"T12:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}):""}</span></div>
            <p style={{fontSize:14,color:"#555",lineHeight:1.6,margin:0}}>{n.text}</p>
          </div>))}
        </div>)}

        {tab==="documents"&&(()=>{
          const DOC_FOLDERS=[
            {name:"Intake Document Submissions",icon:"inbox",subs:["Intake Worksheet","Personal Information Documents","Income Information Documents","Assets Documents","Debts Documents","Tax Documents","Other Related Documents"]},
            {name:"Post Intake Document Followup Request",icon:"file-request",subs:[]},
            {name:"Other - Misc Documents",icon:"template",subs:[]}
          ];
          const docs=lead.documents||[];
          const folderIcon=(icon)=>{
            if(icon==="inbox")return <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 12H16L14 15H10L8 12H2" stroke="#7A9C80" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z" stroke="#7A9C80" strokeWidth="1.5" fill="none"/></svg>;
            if(icon==="file-request")return <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#7A9C80" strokeWidth="1.5" fill="none"/><path d="M14 2v6h6M12 18v-6M9 15l3 3 3-3" stroke="#7A9C80" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
            return <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#7A9C80" strokeWidth="1.5" fill="none"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="#7A9C80" strokeWidth="1.5" strokeLinecap="round"/></svg>;
          };
          const countInFolder=(folderName)=>docs.filter(d=>d.folder===folderName).length;
          const countInSub=(folderName,subName)=>docs.filter(d=>d.folder===folderName&&d.subfolder===subName).length;
          const filesRaw=openSub!==null?docs.filter(d=>d.folder===openFolder&&d.subfolder===openSub):openFolder?docs.filter(d=>d.folder===openFolder&&(!d.subfolder||d.subfolder==="")):[];
          const filesInView=docSort==="recent"?[...filesRaw].sort((a,b)=>b.date.localeCompare(a.date)):[...filesRaw].sort((a,b)=>a.name.localeCompare(b.name));
          const showFiles=openFolder!==null&&(DOC_FOLDERS.find(f=>f.name===openFolder)?.subs.length===0||openSub!==null);
          return(<div>
            {/* Breadcrumb */}
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:16,fontSize:13,color:"#888"}}>
              <span onClick={()=>{setOpenFolder(null);setOpenSub(null);}} style={{cursor:"pointer",color:openFolder?"#7A9C80":"#434343",fontWeight:openFolder?400:600}}>Documents</span>
              {openFolder&&<><span>/</span><span onClick={()=>setOpenSub(null)} style={{cursor:openSub?"pointer":"default",color:openSub?"#7A9C80":"#434343",fontWeight:openSub?400:600}}>{openFolder}</span></>}
              {openSub!==null&&<><span>/</span><span style={{color:"#434343",fontWeight:600}}>{openSub}</span></>}
              <span style={{marginLeft:"auto",fontSize:12,color:"#999"}}>{docs.length} total documents</span>
            </div>

            {/* Folder grid or subfolder list or file list */}
            {openFolder===null?(
              <div style={{display:"grid",gridTemplateColumns:"1fr",gap:12}}>
                {DOC_FOLDERS.map(f=>(
                  <div key={f.name} onClick={()=>{setOpenFolder(f.name);setOpenSub(f.subs.length?null:null);}} style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,cursor:"pointer",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#7A9C80";e.currentTarget.style.boxShadow="0 2px 8px rgba(122,156,128,0.15)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#e0e0e0";e.currentTarget.style.boxShadow="none";}}>
                    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
                      <div style={{width:40,height:40,borderRadius:8,background:"#E7EAE5",display:"flex",alignItems:"center",justifyContent:"center"}}>{folderIcon(f.icon)}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:600,color:"#434343"}}>{f.name}</div>
                        <div style={{fontSize:12,color:"#999"}}>{countInFolder(f.name)} file{countInFolder(f.name)!==1?"s":""}{f.subs.length?" · "+f.subs.length+" subfolder"+(f.subs.length!==1?"s":""):""}</div>
                      </div>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#999" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    </div>
                  </div>
                ))}
              </div>
            ):!showFiles?(
              <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",overflow:"hidden"}}>
                {DOC_FOLDERS.find(f=>f.name===openFolder)?.subs.map((sub,i,arr)=>(
                  <div key={sub} onClick={()=>setOpenSub(sub)} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 20px",borderBottom:i<arr.length-1?"1px solid #f0f0f0":"none",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#f2f3ef"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <div style={{width:34,height:34,borderRadius:6,background:"#E7EAE5",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" stroke="#7A9C80" strokeWidth="1.5" fill="none"/></svg>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:500,color:"#434343"}}>{sub}</div>
                      <div style={{fontSize:12,color:"#999"}}>{countInSub(openFolder,sub)} file{countInSub(openFolder,sub)!==1?"s":""}</div>
                    </div>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#999" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </div>
                ))}
              </div>
            ):(
              <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",overflow:"hidden"}}>
                <div style={{padding:"12px 20px",borderBottom:"1px solid #e0e0e0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <span style={{fontSize:13,color:"#888"}}>{filesInView.length} file{filesInView.length!==1?"s":""}</span>
                    <div style={{display:"flex",gap:4}}>
                      <button onClick={()=>setDocSort("recent")} style={{padding:"4px 10px",fontSize:11,fontWeight:docSort==="recent"?600:400,border:docSort==="recent"?"1.5px solid #7A9C80":"1px solid #d0d0d0",borderRadius:4,background:docSort==="recent"?"#E7EAE5":"#fff",color:docSort==="recent"?"#3d5c43":"#888",cursor:"pointer"}}>Most Recent</button>
                      <button onClick={()=>setDocSort("name")} style={{padding:"4px 10px",fontSize:11,fontWeight:docSort==="name"?600:400,border:docSort==="name"?"1.5px solid #7A9C80":"1px solid #d0d0d0",borderRadius:4,background:docSort==="name"?"#E7EAE5":"#fff",color:docSort==="name"?"#3d5c43":"#888",cursor:"pointer"}}>Name</button>
                    </div>
                  </div>
                  <button style={{background:"#7A9C80",color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>+ Upload</button>
                </div>
                {filesInView.length===0?<div style={{padding:40,textAlign:"center",color:"#999"}}>No files in this folder yet.</div>:
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr style={{background:"#FBFAF7",borderBottom:"1px solid #e0e0e0"}}>{["Name","Type","Date","Size"].map(h=><th key={h} style={{textAlign:"left",padding:"10px 14px",color:"#666",fontWeight:600,fontSize:12,textTransform:"uppercase",letterSpacing:0.5}}>{h}</th>)}</tr></thead>
                  <tbody>{filesInView.map(d=>(<tr key={d.id} style={{borderBottom:"1px solid #f5f5f5"}} onMouseEnter={e=>e.currentTarget.style.background="#f2f3ef"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <td style={{padding:"10px 14px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#7A9C80" strokeWidth="1.5" fill="none"/><path d="M14 2v6h6" stroke="#7A9C80" strokeWidth="1.5"/></svg><span style={{fontWeight:500,color:"#7A9C80"}}>{d.name}</span></div></td>
                    <td style={{padding:"10px 14px",color:"#888"}}>{d.type}</td>
                    <td style={{padding:"10px 14px",color:"#888"}}>{d.date?new Date(d.date+"T12:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}):""}</td>
                    <td style={{padding:"10px 14px",color:"#888"}}>{d.size}</td>
                  </tr>))}</tbody>
                </table>}
              </div>
            )}
          </div>);
        })()}

        {tab==="tasks"&&(()=>{
          const allTasks=lead.tasks||[];
          const outstanding=allTasks.filter(t=>t.status!=="Completed");
          const completed=allTasks.filter(t=>t.status==="Completed");
          const filtered=taskFilter==="outstanding"?outstanding:completed;
          const assigneeOptions=[...ATTORNEYS,...STAFF,...(lead.contacts||[]).map(c=>c.name)].filter((v,i,a)=>a.indexOf(v)===i);
          return(<div>
            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{fontSize:16,fontWeight:600,color:"#434343",margin:0}}>Tasks</h3>
              <button onClick={()=>setShowNewTask(!showNewTask)} style={{padding:"8px 20px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:showNewTask?"#f0f0f0":"#7A9C80",color:showNewTask?"#666":"#fff",cursor:"pointer"}}>{showNewTask?"Cancel":"New Task"}</button>
            </div>

            {/* New Task Form */}
            {showNewTask&&(
              <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,marginBottom:16}}>
                {/* Task Mode Toggle */}
                <div style={{display:"flex",gap:0,marginBottom:16}}>
                  <button onClick={()=>setTaskMode("custom")} style={{flex:1,padding:"10px 16px",fontSize:13,fontWeight:600,border:"1px solid #d0d0d0",borderRadius:"6px 0 0 6px",background:taskMode==="custom"?"#7A9C80":"#fff",color:taskMode==="custom"?"#fff":"#555",cursor:"pointer",transition:"all 0.15s"}}>Assign Custom Task</button>
                  <button onClick={()=>setTaskMode("built")} style={{flex:1,padding:"10px 16px",fontSize:13,fontWeight:600,border:"1px solid #d0d0d0",borderLeft:"none",borderRadius:"0 6px 6px 0",background:taskMode==="built"?"#7A9C80":"#fff",color:taskMode==="built"?"#fff":"#555",cursor:"pointer",transition:"all 0.15s"}}>Assign Built Task</button>
                </div>

                {/* Custom Task Form */}
                {taskMode==="custom"&&(
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div>
                    <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Task Name</label>
                    <input value={newTaskTitle} onChange={e=>setNewTaskTitle(e.target.value)} placeholder="Task name..." style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <div>
                    <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Description</label>
                    <textarea value={newTaskDesc} onChange={e=>setNewTaskDesc(e.target.value)} placeholder="Task description (optional)..." rows={2} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Due Date</label>
                      <input type="date" value={newTaskDue} onChange={e=>setNewTaskDue(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Assign To</label>
                      <select value={newTaskAssignee} onChange={e=>setNewTaskAssignee(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,background:"#fff"}}>
                        {assigneeOptions.map(a=><option key={a} value={a}>{a}</option>)}
                      </select>
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}>
                    <button onClick={addTask} disabled={!newTaskTitle.trim()} style={{padding:"8px 24px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:newTaskTitle.trim()?"#7A9C80":"#ccc",color:"#fff",cursor:newTaskTitle.trim()?"pointer":"default"}}>Save Task</button>
                  </div>
                </div>
                )}

                {/* Built Task Form */}
                {taskMode==="built"&&(
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div>
                    <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Select Task</label>
                    <select value={selectedBuiltTask} onChange={e=>setSelectedBuiltTask(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,background:"#fff"}}>
                      <option value="">Choose a task...</option>
                      {BUILT_TASK_CATEGORIES.map(cat=>(
                        <optgroup key={cat} label={cat}>{BUILT_TASKS.filter(t=>t.category===cat).map(t=><option key={t.title} value={t.title}>{t.title}</option>)}</optgroup>
                      ))}
                    </select>
                  </div>
                  {selectedBuiltTask&&(
                    <div style={{fontSize:12,color:"#666",background:"#f8f9f6",padding:"8px 12px",borderRadius:6,border:"1px solid #e7eae5"}}>
                      Priority: <strong style={{color:"#3d5c43"}}>{BUILT_TASKS.find(t=>t.title===selectedBuiltTask)?.priority}</strong> &middot; Category: <strong style={{color:"#3d5c43"}}>{BUILT_TASKS.find(t=>t.title===selectedBuiltTask)?.category}</strong>
                    </div>
                  )}

                    <div style={{fontSize:11,color:"#999"}}>{(commAutomations||[]).length} automation{(commAutomations||[]).length!==1?"s":""}</div>
                  </div>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{transform:showRunAuto?"rotate(180deg)":"rotate(0)",transition:"transform 0.15s"}}><path d="M6 9l6 6 6-6" stroke="#999" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                {showRunAuto&&(
                  <div>
                    <select value={selectedAuto} onChange={e=>setSelectedAuto(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:12,outline:"none",background:"#fff",marginBottom:8}}>
                      <option value="">— Select an automation —</option>
                      {(commAutomations||[]).map(a=><option key={a.id} value={a.id}>{a.title}</option>)}
                    </select>
                    {selectedAuto&&(()=>{const auto=(commAutomations||[]).find(a=>String(a.id)===String(selectedAuto));return auto?<div style={{fontSize:11,color:"#888",marginBottom:8,padding:"6px 8px",background:"#f8fafc",borderRadius:4}}>{auto.desc||"No description"}</div>:null;})()}
                    <button onClick={runAutomation} disabled={!selectedAuto} style={{width:"100%",padding:"7px 0",fontSize:12,fontWeight:600,border:"none",borderRadius:6,background:selectedAuto?"#F59E0B":"#ccc",color:"#fff",cursor:selectedAuto?"pointer":"default"}}>Run Automation</button>
                  </div>
                )}
              </div>
            </div>

            {/* Filter bar */}
            <div style={{display:"flex",gap:6,marginBottom:16}}>
              {[{key:"all",label:"All"},{key:"email",label:"Email"},{key:"text",label:"Text"},{key:"magic-link",label:"Magic Link"},{key:"phone",label:"Phone"}].map(f=>(
                <button key={f.key} onClick={()=>setCommFilter(f.key)} style={{padding:"7px 16px",fontSize:13,fontWeight:commFilter===f.key?600:400,cursor:"pointer",borderRadius:6,border:commFilter===f.key?"2px solid #7A9C80":"1px solid #d0d0d0",background:commFilter===f.key?"#E7EAE5":"#fff",color:commFilter===f.key?"#3d5c43":"#888",transition:"all 0.15s"}}>{f.label} ({f.key==="magic-link"?comms.filter(c=>c.type==="Magic Link").length:counts[f.key]})</button>
              ))}
            </div>

            {/* Send Email compose */}
            {commFilter==="email"&&(
              <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:showEmailCompose?16:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:"#E7EAE5",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2" stroke="#7A9C80" strokeWidth="2" fill="none"/><path d="M22 6L12 13 2 6" stroke="#7A9C80" strokeWidth="2"/></svg>
                    </div>
                    <div>
                      <div style={{fontSize:14,fontWeight:600,color:"#434343"}}>Send Email</div>
                      <div style={{fontSize:12,color:"#888"}}>Email to {clientContact.email||lead.email||"client"}</div>
                    </div>
                  </div>
                  <button onClick={()=>setShowEmailCompose(!showEmailCompose)} style={{padding:"8px 18px",fontSize:13,fontWeight:500,border:"none",borderRadius:6,background:showEmailCompose?"#f0f0f0":"#7A9C80",color:showEmailCompose?"#666":"#fff",cursor:"pointer"}}>{showEmailCompose?"Cancel":"Compose"}</button>
                </div>
                {showEmailCompose&&(
                  <div style={{borderTop:"1px solid #eee",paddingTop:16}}>
                    <div style={{display:"flex",gap:16,marginBottom:12,fontSize:12,color:"#888"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontWeight:600,color:"#434343"}}>To:</span>
                        <strong style={{color:"#434343"}}>{clientContact.email||lead.email||"—"}</strong>
                      </div>
                    </div>
                    <input value={emailSubject} onChange={e=>setEmailSubject(e.target.value)} placeholder="Subject" style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",marginBottom:8,boxSizing:"border-box"}}/>
                    <textarea value={emailBody} onChange={e=>setEmailBody(e.target.value)} placeholder="Write your email..." rows={4} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
                    <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
                      <button onClick={sendEmail} disabled={!emailBody.trim()||!emailSubject.trim()} style={{padding:"8px 20px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:(emailBody.trim()&&emailSubject.trim())?"#7A9C80":"#ccc",color:"#fff",cursor:(emailBody.trim()&&emailSubject.trim())?"pointer":"default",display:"flex",alignItems:"center",gap:6}}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        Send Email
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Send Text compose */}
            {commFilter==="text"&&(
              <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:showTextCompose?16:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:"#E3F2FD",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#1565C0" strokeWidth="2" fill="none"/></svg>
                    </div>
                    <div>
                      <div style={{fontSize:14,fontWeight:600,color:"#434343"}}>Send Text</div>
                      <div style={{fontSize:12,color:"#888"}}>Text to {clientContact.phone||lead.phone||"client"}</div>
                    </div>
                  </div>
                  <button onClick={()=>setShowTextCompose(!showTextCompose)} style={{padding:"8px 18px",fontSize:13,fontWeight:500,border:"none",borderRadius:6,background:showTextCompose?"#f0f0f0":"#7A9C80",color:showTextCompose?"#666":"#fff",cursor:"pointer"}}>{showTextCompose?"Cancel":"Compose"}</button>
                </div>
                {showTextCompose&&(
                  <div style={{borderTop:"1px solid #eee",paddingTop:16}}>
                    <div style={{display:"flex",gap:16,marginBottom:12,fontSize:12,color:"#888"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontWeight:600,color:"#434343"}}>To:</span>
                        <strong style={{color:"#434343"}}>{clientContact.phone||lead.phone||"—"}</strong>
                      </div>
                    </div>
                    <textarea value={textBody} onChange={e=>setTextBody(e.target.value)} placeholder="Write your text message..." rows={3} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
                    <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
                      <button onClick={sendText} disabled={!textBody.trim()} style={{padding:"8px 20px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:textBody.trim()?"#7A9C80":"#ccc",color:"#fff",cursor:textBody.trim()?"pointer":"default",display:"flex",alignItems:"center",gap:6}}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        Send Text
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Log Phone Call */}
            {commFilter==="phone"&&(
              <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:showPhoneLog?16:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:"#dce8de",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92z" stroke="#5a7e60" strokeWidth="2" fill="none"/></svg>
                    </div>
                    <div>
                      <div style={{fontSize:14,fontWeight:600,color:"#434343"}}>Log Phone Call</div>
                      <div style={{fontSize:12,color:"#888"}}>Record notes from a phone call with {clientContact.name||lead.firstName+" "+lead.lastName}</div>
                    </div>
                  </div>
                  <button onClick={()=>setShowPhoneLog(!showPhoneLog)} style={{padding:"8px 18px",fontSize:13,fontWeight:500,border:"none",borderRadius:6,background:showPhoneLog?"#f0f0f0":"#7A9C80",color:showPhoneLog?"#666":"#fff",cursor:"pointer"}}>{showPhoneLog?"Cancel":"Log Call"}</button>
                </div>
                {showPhoneLog&&(
                  <div style={{borderTop:"1px solid #eee",paddingTop:16}}>
                    <div style={{display:"flex",gap:16,marginBottom:12,fontSize:12,color:"#888"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontWeight:600,color:"#434343"}}>With:</span>
                        <strong style={{color:"#434343"}}>{clientContact.name||lead.firstName+" "+lead.lastName}</strong>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontWeight:600,color:"#434343"}}>Phone:</span>
                        <strong style={{color:"#434343"}}>{clientContact.phone||lead.phone||"—"}</strong>
                      </div>
                    </div>
                    <div style={{marginBottom:8}}>
                      <input value={phoneDuration} onChange={e=>setPhoneDuration(e.target.value)} placeholder="Duration (e.g. 15 min)" style={{width:200,padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                    </div>
                    <textarea value={phoneNote} onChange={e=>setPhoneNote(e.target.value)} placeholder="Call notes... what was discussed?" rows={4} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
                    <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
                      <button onClick={logPhoneCall} disabled={!phoneNote.trim()} style={{padding:"8px 20px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:phoneNote.trim()?"#7A9C80":"#ccc",color:"#fff",cursor:phoneNote.trim()?"pointer":"default",display:"flex",alignItems:"center",gap:6}}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        Save Call Log
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Communication list */}
            <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",overflow:"hidden"}}>
              {filtered.length===0?<div style={{padding:40,textAlign:"center",color:"#999"}}>No {commFilter==="all"?"communications":commFilter+" messages"} logged.</div>:
              filtered.map((c,i)=>(
                <div key={c.id} style={{display:"flex",gap:16,padding:"16px 20px",borderBottom:i<filtered.length-1?"1px solid #f0f0f0":"none"}} onMouseEnter={e=>e.currentTarget.style.background="#f2f3ef"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <div style={{width:38,height:38,borderRadius:"50%",background:c.type==="Magic Link"?"linear-gradient(135deg,#E7EAE5,#dce8de)":c.type==="Email"?"#E7EAE5":c.type==="Text"?"#E3F2FD":c.type==="Phone"?"#dce8de":"#f3e8ff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                      {c.type==="Magic Link"?<><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" stroke="#3d5c43" strokeWidth="1.8" strokeLinecap="round"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" stroke="#3d5c43" strokeWidth="1.8" strokeLinecap="round"/></>:
                       c.type==="Email"?<><rect x="2" y="4" width="20" height="16" rx="2" stroke="#7A9C80" strokeWidth="1.5" fill="none"/><path d="M22 6L12 13 2 6" stroke="#7A9C80" strokeWidth="1.5"/></>:
                       c.type==="Text"?<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#1565C0" strokeWidth="1.5" fill="none"/>:
                       c.type==="Phone"?<path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92z" stroke="#5a7e60" strokeWidth="1.5" fill="none"/>:
                       <><circle cx="12" cy="7" r="4" stroke="#8b5cf6" strokeWidth="1.5" fill="none"/><path d="M4 21v-2a4 4 0 014-4h8a4 4 0 014 4v2" stroke="#8b5cf6" strokeWidth="1.5" fill="none"/></>}
                    </svg>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:14,fontWeight:500,color:"#434343"}}>{c.subject}</span>
                        {c.type==="Magic Link"&&<span style={{fontSize:10,fontWeight:600,background:"linear-gradient(135deg,#E7EAE5,#dce8de)",color:"#3d5c43",padding:"2px 8px",borderRadius:10,display:"flex",alignItems:"center",gap:3}}><svg width="10" height="10" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2" stroke="#3d5c43" strokeWidth="2" fill="none"/></svg>+<svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#3d5c43" strokeWidth="2" fill="none"/></svg></span>}
                        {c.automated&&<span style={{fontSize:10,fontWeight:600,background:"#FFFBEB",color:"#92400E",padding:"2px 8px",borderRadius:10,border:"1px solid #FCD34D",display:"flex",alignItems:"center",gap:4}}><svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke="#92400E" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>Auto</span>}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:12,color:"#999",whiteSpace:"nowrap"}}>{c.date?new Date(c.date+"T12:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}):""}</span>
                        <button onClick={async()=>{if(await confirm({title:"Delete Communication",message:"Delete this communication entry?",confirmLabel:"Delete"})){update({communications:lead.communications.filter(x=>x.id!==c.id),activeSequences:c.subject&&c.subject.startsWith("Sequence started:")?(lead.activeSequences||[]).filter(s=>s.title!==c.subject.replace("Sequence started: ","")):(lead.activeSequences||[])});}}} style={{background:"none",border:"none",cursor:"pointer",padding:4,opacity:0.4}} title="Delete communication"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="3,6 5,6 21,6" stroke="#666" strokeWidth="1.5" strokeLinecap="round"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke="#666" strokeWidth="1.5" fill="none"/></svg></button>
                      </div>
                    </div>
                    <div style={{fontSize:13,color:"#888"}}>{c.type==="Magic Link"?"Email + Text · "+c.direction+(c.to?" · "+c.to:""):(c.type+(c.direction!=="N/A"?" · "+c.direction:"")+(c.from?" · "+c.from:"")+(c.to?" · "+c.to:"")+(c.duration?" · "+c.duration:""))}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>);
        })()}

        {tab==="calendar"&&(()=>{
          const today=new Date().toISOString().split("T")[0];
          const events=[...(lead.calendarEvents||[])].sort((a,b)=>a.date.localeCompare(b.date));
          const upcoming=events.filter(ev=>ev.date>=today);
          const past=events.filter(ev=>ev.date<today);
          const filtered=calFilter==="upcoming"?upcoming:calFilter==="past"?past:events;
          return(<div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h3 style={{fontSize:16,fontWeight:600,color:"#434343",margin:0}}>Calendar Events</h3>
              <button onClick={()=>setShowNewEvent(!showNewEvent)} style={{padding:"8px 20px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:showNewEvent?"#f0f0f0":"#7A9C80",color:showNewEvent?"#666":"#fff",cursor:"pointer"}}>{showNewEvent?"Cancel":"New Event"}</button>
            </div>

            {showNewEvent&&(
              <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:20,marginBottom:16}}>
                <div style={{fontSize:14,fontWeight:600,color:"#434343",marginBottom:16}}>Create New Event</div>
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div>
                    <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Title</label>
                    <input value={newEvTitle} onChange={e=>setNewEvTitle(e.target.value)} placeholder="Event title..." style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,color:"#434343",cursor:"pointer"}}>
                      <input type="checkbox" checked={newEvAllDay} onChange={e=>setNewEvAllDay(e.target.checked)} style={{accentColor:"#7A9C80"}}/>
                      All day
                    </label>
                  </div>
                  <div style={{display:"flex",gap:12}}>
                    <div style={{flex:1}}>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Start Date</label>
                      <input type="date" value={newEvStartDate} onChange={e=>{setNewEvStartDate(e.target.value);if(!newEvEndDate)setNewEvEndDate(e.target.value);}} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                    </div>
                    {!newEvAllDay&&<div style={{flex:1}}>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Start Time</label>
                      <input type="time" value={newEvStartTime} onChange={e=>setNewEvStartTime(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                    </div>}
                    <div style={{flex:1}}>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>End Date</label>
                      <input type="date" value={newEvEndDate} onChange={e=>setNewEvEndDate(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                    </div>
                    {!newEvAllDay&&<div style={{flex:1}}>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>End Time</label>
                      <input type="time" value={newEvEndTime} onChange={e=>setNewEvEndTime(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                    </div>}
                  </div>
                  <div style={{display:"flex",gap:12}}>
                    <div style={{flex:1}}>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Location</label>
                      <input value={newEvLocation} onChange={e=>setNewEvLocation(e.target.value)} placeholder="Location (optional)" style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                    </div>
                  </div>
                  <div>
                    <label style={{display:"block",fontSize:12,color:"#888",marginBottom:6}}>Assign To</label>
                    <div style={{display:"flex",gap:6}}>
                      {[{name:"Matt McCune",color:"#7a9c80"},{name:"Bob Stevens",color:"#214e5f"},{name:"Angie Sullivan",color:"#e67e22"},{name:"Andrea Rubino",color:"#8e44ad"}].map(u=>(
                        <button key={u.name} onClick={()=>setNewEvAssignee(u.name)} style={{padding:"6px 14px",fontSize:12,fontWeight:newEvAssignee===u.name?600:400,border:newEvAssignee===u.name?"2px solid "+u.color:"1px solid #d0d0d0",borderRadius:6,background:newEvAssignee===u.name?u.color+"18":"#fff",color:newEvAssignee===u.name?u.color:"#888",cursor:"pointer",transition:"all 0.15s"}}>{u.name.split(" ")[0]}</button>
                      ))}
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}>
                    <button onClick={addEvent} disabled={!newEvTitle.trim()||!newEvStartDate} style={{padding:"8px 24px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:(newEvTitle.trim()&&newEvStartDate)?"#7A9C80":"#ccc",color:"#fff",cursor:(newEvTitle.trim()&&newEvStartDate)?"pointer":"default"}}>Save Event</button>
                  </div>
                </div>
              </div>
            )}

            <div style={{display:"flex",gap:6,marginBottom:16}}>
              {[{key:"upcoming",label:"Upcoming",count:upcoming.length},{key:"past",label:"Past",count:past.length},{key:"all",label:"All",count:events.length}].map(f=>(
                <button key={f.key} onClick={()=>setCalFilter(f.key)} style={{padding:"7px 16px",fontSize:13,fontWeight:calFilter===f.key?600:400,cursor:"pointer",borderRadius:6,border:calFilter===f.key?"2px solid #7A9C80":"1px solid #d0d0d0",background:calFilter===f.key?"#E7EAE5":"#fff",color:calFilter===f.key?"#3d5c43":"#888",transition:"all 0.15s"}}>{f.label} ({f.count})</button>
              ))}
            </div>

            <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",overflow:"hidden"}}>
              {filtered.length===0?<div style={{padding:40,textAlign:"center",color:"#999"}}>{calFilter==="upcoming"?"No upcoming events.":calFilter==="past"?"No past events.":"No events."}</div>:(
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr style={{background:"#FBFAF7",borderBottom:"1px solid #e0e0e0"}}>
                  {["Start Date","Start Time","End Date","End Time","Title","Assignee","Location",""].map(h=><th key={h} style={{textAlign:"left",padding:"10px 14px",color:"#666",fontWeight:600,fontSize:12,textTransform:"uppercase",letterSpacing:0.5}}>{h}</th>)}
                </tr></thead>
                <tbody>{filtered.map(ev=>{
                  const formatDate=(d)=>{if(!d)return"—";const dt=new Date(d+"T12:00:00");return dt.toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"});};
                  const formatTime=(t,allDay)=>{if(allDay||t==="All day")return"All day";if(!t)return"—";try{const[h,m]=t.split(":");const hr=parseInt(h);return(hr>12?hr-12:hr||12)+":"+m+(hr>=12?" PM":" AM");}catch{return t;}};
                  return(<tr key={ev.id} style={{borderBottom:"1px solid #f0f0f0",opacity:ev.date<today?0.6:1}} onMouseEnter={e=>e.currentTarget.style.background="#f2f3ef"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <td style={{padding:"12px 14px"}}>{formatDate(ev.date)}</td>
                    <td style={{padding:"12px 14px"}}>{formatTime(ev.time,ev.allDay)}</td>
                    <td style={{padding:"12px 14px"}}>{formatDate(ev.endDate||ev.date)}</td>
                    <td style={{padding:"12px 14px"}}>{formatTime(ev.endTime,ev.allDay)}</td>

                    <td style={{padding:"12px 14px",color:"#555"}}>{ev.assignee||"—"}</td>
                    <td style={{padding:"12px 14px",color:"#888"}}>{ev.location||"—"}</td>
                    <td style={{padding:"12px 14px"}}><button onClick={()=>deleteEvent(ev.id)} style={{background:"none",border:"none",cursor:"pointer",padding:4,opacity:0.4}} title="Delete event"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="3,6 5,6 21,6" stroke="#666" strokeWidth="1.5" strokeLinecap="round"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke="#666" strokeWidth="1.5" fill="none"/></svg></button></td>
                  </tr>);

              </table>)}

        })()}

        {tab==="accounting"&&(()=>{
          const acctData=lead.accounting||{trust:[],operating:[]};
          const trustEntries=acctData.trust||[];
          const opEntries=acctData.operating||[];
          const trustBalance=trustEntries.reduce((sum,e)=>e.type.includes("Received")||e.type==="Transfer from Operating"?sum+e.amount:sum-e.amount,0);
          const opBalance=opEntries.reduce((sum,e)=>e.type.includes("Received")||e.type==="Transfer from Trust"?sum+e.amount:sum-e.amount,0);
          const addAcctEntry=()=>{
            if(!acctEntryAmount||!acctEntryDesc.trim())return;
            const amt=parseFloat(acctEntryAmount);
            const entry={id:Date.now(),date:acctEntryDate,type:acctEntryType,amount:amt,description:acctEntryDesc,addedBy:"Matt McCune"};
            const updated={trust:[...(acctData.trust||[])],operating:[...(acctData.operating||[])]};
            if(acctEntryType==="Transfer: Trust → Operating"){
              updated.trust=[{...entry,type:"Transfer to Operating"},...updated.trust];
              updated.operating=[{...entry,id:Date.now()+1,type:"Transfer from Trust"},...updated.operating];
            }else if(acctEntryType==="Transfer: Operating → Trust"){
              updated.operating=[{...entry,type:"Transfer to Trust"},...updated.operating];
              updated.trust=[{...entry,id:Date.now()+1,type:"Transfer from Operating"},...updated.trust];
            }else if(acctEntryType==="Funds Received into Trust"){
              updated.trust=[{...entry,type:"Funds Received"},...updated.trust];
            }else if(acctEntryType==="Funds Disbursed from Trust"){
              updated.trust=[{...entry,type:"Funds Disbursed"},...updated.trust];
            }else if(acctEntryType==="Funds Received into Operating"){
              updated.operating=[{...entry,type:"Funds Received"},...updated.operating];
            }else if(acctEntryType==="Funds Disbursed from Operating"){
              updated.operating=[{...entry,type:"Funds Disbursed"},...updated.operating];
            }
            update({accounting:updated});
            setAcctEntryAmount("");setAcctEntryDesc("");setAcctEntryType("Funds Received into Trust");setShowAcctEntry(false);
          };
          const allEntries=[...trustEntries.map(e=>({...e,account:"Trust"})),...opEntries.map(e=>({...e,account:"Operating"}))].sort((a,b)=>b.id-a.id);
          const displayEntries=acctTab==="trust"?trustEntries:acctTab==="operating"?opEntries:allEntries;
          return(
          <div>
            <div style={{display:"flex",gap:0,marginBottom:16,borderRadius:8,overflow:"hidden",border:"1px solid #d0d0d0",width:"fit-content"}}>
              <button onClick={()=>setAcctTab("trust")} style={{padding:"10px 24px",fontSize:13,fontWeight:600,border:"none",cursor:"pointer",background:acctTab==="trust"?"#7a9c80":"#fff",color:acctTab==="trust"?"#fff":"#434343"}}>Trust</button>
              <button onClick={()=>setAcctTab("operating")} style={{padding:"10px 24px",fontSize:13,fontWeight:600,border:"none",cursor:"pointer",background:acctTab==="operating"?"#7a9c80":"#fff",color:acctTab==="operating"?"#fff":"#434343",borderLeft:"1px solid #d0d0d0"}}>Operating</button>
              <button onClick={()=>setAcctTab("all")} style={{padding:"10px 24px",fontSize:13,fontWeight:600,border:"none",cursor:"pointer",background:acctTab==="all"?"#7a9c80":"#fff",color:acctTab==="all"?"#fff":"#434343",borderLeft:"1px solid #d0d0d0"}}>All Transactions</button>
            </div>
            <div style={{display:"flex",gap:16,marginBottom:16}}>
              <div style={{flex:1,background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:"16px 20px"}}>
                <div style={{fontSize:12,color:"#888",fontWeight:500,textTransform:"uppercase",letterSpacing:0.5}}>Trust Balance</div>
                <div style={{fontSize:20,fontWeight:700,color:trustBalance>=0?"#3d5c43":"#c0392b"}}>{fmtDec(trustBalance)}</div>
              </div>
              <div style={{flex:1,background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",padding:"16px 20px"}}>
                <div style={{fontSize:12,color:"#888",fontWeight:500,textTransform:"uppercase",letterSpacing:0.5}}>Operating Balance</div>
                <div style={{fontSize:20,fontWeight:700,color:opBalance>=0?"#3d5c43":"#c0392b"}}>{fmtDec(opBalance)}</div>
              </div>
            </div>
            <div style={{background:"#fff",borderRadius:8,border:"1px solid #e0e0e0",overflow:"hidden"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 20px",borderBottom:"1px solid #e0e0e0",background:"#FBFAF7"}}>
                <div style={{fontSize:14,fontWeight:600,color:"#434343"}}>{acctTab==="trust"?"Trust Account":acctTab==="operating"?"Operating Account":"All Transactions"}</div>
                <button onClick={()=>setShowAcctEntry(true)} style={{padding:"8px 16px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:"#7a9c80",color:"#fff",cursor:"pointer"}}>+ New Entry</button>
              </div>
              {showAcctEntry&&(
                <div style={{padding:20,borderBottom:"1px solid #e0e0e0",background:"#f9faf8"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
                    <div>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Type</label>
                      <select value={acctEntryType} onChange={e=>setAcctEntryType(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,background:"#fff"}}>
                        <optgroup label="Trust Account">
                          <option>Funds Received into Trust</option>
                          <option>Funds Disbursed from Trust</option>
                        </optgroup>
                        <optgroup label="Operating Account">
                          <option>Funds Received into Operating</option>
                          <option>Funds Disbursed from Operating</option>
                        </optgroup>
                        <optgroup label="Transfer Between Accounts">
                          <option>Transfer: Trust → Operating</option>
                          <option>Transfer: Operating → Trust</option>
                        </optgroup>
                      </select>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Amount</label>
                      <input type="number" value={acctEntryAmount} onChange={e=>setAcctEntryAmount(e.target.value)} placeholder="0.00" style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Date</label>
                      <input type="date" value={acctEntryDate} onChange={e=>setAcctEntryDate(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>
                    </div>
                  </div>
                  <div style={{marginBottom:12}}>
                    <label style={{display:"block",fontSize:12,color:"#888",marginBottom:4}}>Description</label>
                    <input value={acctEntryDesc} onChange={e=>setAcctEntryDesc(e.target.value)} placeholder="Payment description..." style={{width:"100%",padding:"8px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/>

                  <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                    <button onClick={()=>setShowAcctEntry(false)} style={{padding:"8px 16px",fontSize:12,border:"1px solid #d0d0d0",borderRadius:6,background:"#fff",color:"#434343",cursor:"pointer"}}>Cancel</button>
                    <button onClick={addAcctEntry} style={{padding:"8px 16px",fontSize:12,border:"none",borderRadius:6,background:"#7a9c80",color:"#fff",cursor:"pointer",fontWeight:600}}>Save Entry</button>
                  </div>
                </div>

              {displayEntries.length>0?(
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr style={{background:"#FBFAF7",borderBottom:"1px solid #e0e0e0"}}>

                  <tbody>{displayEntries.map(e=>{

                    const typeColor=isCredit?"#3d5c43":e.type.includes("Transfer")?"#1a73e8":"#c0392b";
                    return(
                    <tr key={e.id} style={{borderBottom:"1px solid #f0f0f0"}} onMouseEnter={ev=>ev.currentTarget.style.background="#f2f3ef"} onMouseLeave={ev=>ev.currentTarget.style.background="transparent"}>
                      <td style={{padding:"12px 14px"}}>{new Date(e.date+"T12:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"})}</td>
                      {acctTab==="all"&&<td style={{padding:"12px 14px"}}><span style={{padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600,background:e.account==="Trust"?"#f0e6ff":"#fff3e0",color:e.account==="Trust"?"#6a1b9a":"#e65100"}}>{e.account}</span></td>}
                      <td style={{padding:"12px 14px"}}><span style={{padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600,background:typeBg,color:typeColor}}>{e.type}</span></td>
                      <td style={{padding:"12px 14px",color:"#555"}}>{e.description}</td>
                      <td style={{padding:"12px 14px",fontWeight:600,color:isCredit?"#3d5c43":"#c0392b"}}>{isCredit?"+":"-"}{fmtDec(e.amount)}</td>
                      <td style={{padding:"12px 14px",color:"#888"}}>{e.addedBy}</td>
                    </tr>);
                  })}</tbody>
                </table>
              ):(
                <div style={{padding:40,textAlign:"center",color:"#999"}}>
                  <p style={{fontSize:13}}>No entries recorded.</p>
                </div>
              )}
            </div>
          </div>);
        })()}

        {tab==="ai"&&(<AITab item={lead} isLead={true} update={update}/>)}
      </div>

      {showHiredConfirm&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:60}} onClick={()=>setShowHiredConfirm(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:12,padding:28,width:440,maxWidth:"90vw",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
              <div style={{width:40,height:40,borderRadius:8,background:"#dce8de",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22 11.08V12a10 10 0 11-5.93-9.14" stroke="#3d5c43" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M22 4L12 14.01l-3-3" stroke="#3d5c43" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg></div>
              <h3 style={{fontSize:17,fontWeight:700,color:"#434343",margin:0}}>Convert Lead to Matter?</h3>
            </div>
            <p style={{fontSize:14,color:"#666",lineHeight:1.6,margin:"0 0 20px"}}>
              You are about to convert <strong>{lead.firstName} {lead.lastName}</strong> from a lead to an active matter. This will remove them from the leads pipeline and create a new matter.
            </p>
            <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
              <button onClick={()=>setShowHiredConfirm(false)} style={{padding:"10px 24px",fontSize:13,fontWeight:500,border:"1px solid #d0d0d0",borderRadius:6,background:"#fff",color:"#434343",cursor:"pointer"}}>Cancel</button>
              <button onClick={convertLeadToMatter} style={{padding:"10px 24px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:"#7a9c80",color:"#fff",cursor:"pointer"}}>Yes, Convert to Matter</button>
            </div>
          </div>
        </div>
      )}

      {taskNotifyPopup&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
          <div style={{background:"#fff",borderRadius:12,padding:"32px 36px",maxWidth:420,width:"90%",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
            <h3 style={{fontSize:16,fontWeight:700,color:"#434343",marginBottom:8}}>Notify Client</h3>
            <p style={{fontSize:13,color:"#666",marginBottom:20,lineHeight:1.5}}>Task <strong>"{taskNotifyPopup.title}"</strong> has been assigned to <strong>{taskNotifyPopup.assignee}</strong>. How would you like to notify them?</p>
            <div style={{display:"flex",gap:10,marginBottom:16}}>
              <button onClick={()=>{alert("Email notification sent to "+taskNotifyPopup.assignee);setTaskNotifyPopup(null);}} style={{flex:1,padding:"10px 16px",fontSize:13,fontWeight:600,border:"1px solid #d0d0d0",borderRadius:6,background:"#fff",color:"#434343",cursor:"pointer"}}>Email</button>
              <button onClick={()=>{alert("Text notification sent to "+taskNotifyPopup.assignee);setTaskNotifyPopup(null);}} style={{flex:1,padding:"10px 16px",fontSize:13,fontWeight:600,border:"1px solid #d0d0d0",borderRadius:6,background:"#fff",color:"#434343",cursor:"pointer"}}>Text</button>
              <button onClick={()=>{alert("Magic Link sent to "+taskNotifyPopup.assignee);setTaskNotifyPopup(null);}} style={{flex:1,padding:"10px 16px",fontSize:13,fontWeight:600,border:"none",borderRadius:6,background:"#7a9c80",color:"#fff",cursor:"pointer"}}>Magic Link</button>
            </div>
            <button onClick={()=>setTaskNotifyPopup(null)} style={{width:"100%",padding:"8px",fontSize:12,color:"#888",background:"none",border:"none",cursor:"pointer"}}>Skip — Don't notify</button>
          </div>
        </div>
      )}
      {/* Edit Lead Modal */}
      {editingLead&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50}} onClick={()=>setEditingLead(false)}>
          <div style={{background:"#fff",borderRadius:12,padding:"28px 32px",width:480,maxWidth:"90vw",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h3 style={{fontSize:18,fontWeight:700,color:"#434343",margin:0}}>Edit Lead</h3>
              <div style={{cursor:"pointer",fontSize:20,color:"#999",lineHeight:1}} onClick={()=>setEditingLead(false)}>&times;</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
              <div><label style={{fontSize:12,fontWeight:600,color:"#666",marginBottom:4,display:"block"}}>First Name</label><input type="text" value={editForm.firstName||""} onChange={e=>setEditForm({...editForm,firstName:e.target.value})} style={{width:"100%",padding:"9px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/></div>
              <div><label style={{fontSize:12,fontWeight:600,color:"#666",marginBottom:4,display:"block"}}>Last Name</label><input type="text" value={editForm.lastName||""} onChange={e=>setEditForm({...editForm,lastName:e.target.value})} style={{width:"100%",padding:"9px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
              <div><label style={{fontSize:12,fontWeight:600,color:"#666",marginBottom:4,display:"block"}}>Email</label><input type="email" value={editForm.email||""} onChange={e=>setEditForm({...editForm,email:e.target.value})} style={{width:"100%",padding:"9px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/></div>
              <div><label style={{fontSize:12,fontWeight:600,color:"#666",marginBottom:4,display:"block"}}>Phone</label><input type="tel" value={editForm.phone||""} onChange={e=>setEditForm({...editForm,phone:e.target.value})} style={{width:"100%",padding:"9px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/></div>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"#434343",cursor:"pointer"}}>
                <input type="checkbox" checked={editForm.isJoint||false} onChange={e=>setEditForm({...editForm,isJoint:e.target.checked,joint:editForm.joint||{firstName:"",lastName:"",email:"",phone:""}})} style={{accentColor:"#7A9C80"}}/>
                <span style={{fontWeight:600}}>Joint Case</span><span style={{color:"#888",fontWeight:400}}>(second contact)</span>
              </label>
            </div>
            {editForm.isJoint&&(
              <div style={{background:"#f9faf8",border:"1px solid #e0e0e0",borderRadius:8,padding:14,marginBottom:14}}>
                <div style={{fontSize:12,fontWeight:600,color:"#7A9C80",marginBottom:10}}>Second Contact (Spouse/Joint Filer)</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:10}}>
                  <div><label style={{fontSize:12,fontWeight:600,color:"#666",marginBottom:4,display:"block"}}>First Name</label><input type="text" value={(editForm.joint||{}).firstName||""} onChange={e=>setEditForm({...editForm,joint:{...(editForm.joint||{}),firstName:e.target.value}})} style={{width:"100%",padding:"9px 12px",borderRadius:6,border:"1px solid #d0d0d0",fontSize:13,boxSizing:"border-box"}}/></div>

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>

              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {dynamicLeadStages.map(s=>{
                  const active=editForm.leadStage===s;
                  return(
                    <div key={s} onClick={()=>setEditForm({...editForm,leadStage:s})} style={{padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer",borderRadius:6,border:active?"2px solid #7A9C80":"1px solid #d0d0d0",background:active?"#E7EAE5":"#fff",color:active?"#3d5c43":"#888",transition:"all 0.15s"}}>
                      {s}

                })}
              </div>
